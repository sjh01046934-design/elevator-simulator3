<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>승강기 검사기준 시뮬레이터</title>

<style>
:root{
  --bg:#0b1220;
  --bg-grad-1:#14234a;
  --bg-grad-2:#0b1220;

  --card:#111b2e;
  --card-soft:rgba(17,27,46,.72);
  --panel-top:rgba(255,255,255,.04);
  --panel-bottom:rgba(255,255,255,.02);

  --muted:#9fb0d0;
  --text:#e7eefc;
  --green:#19c37d;
  --red:#ff4d4f;
  --line:#22314f;
  --shadow:0 10px 30px rgba(0,0,0,.35);

  --input-bg:rgba(10,16,30,.55);
  --button-bg:rgba(22,37,69,.85);
  --button-bg-soft:rgba(22,37,69,.65);
  --button-hover:rgba(35,60,105,.95);

  --header-bg-1:rgba(11,18,32,.98);
  --header-bg-2:rgba(11,18,32,.92);

  --tab-bg:rgba(22,37,69,.55);
  --tab-active-bg:rgba(25,195,125,.95);
  --tab-active-text:#00120a;

  --topic-border:rgba(255,255,255,.08);
  --keyword-border:rgba(255,255,255,.08);
  --keyword-bg:rgba(10,16,30,.25);
  --keyword-hover:rgba(255,255,255,.04);
  --title-list-border:rgba(255,255,255,.06);
  --title-list-bg:rgba(255,255,255,.02);
  --title-btn-bg:rgba(255,255,255,.02);
  --title-btn-hover:rgba(255,255,255,.06);
  --title-btn-active:rgba(25,195,125,.14);
  --title-btn-active-border:rgba(25,195,125,.65);

  --modal-bg:rgba(0,0,0,.85);
  --fb-overlay:rgba(0,0,0,.72);
  --fb-box-bg:rgba(17,27,46,.98);

  --selected-bg:#b6ff5c;
  --selected-text:#000;

  --img-caption:#9fb0d0;
  --img-border:#22314f;

  --mark-bg:yellow;
  --mark-text:black;
}

body.light-mode{
  --bg:#f5f7fb;
  --bg-grad-1:#ffffff;
  --bg-grad-2:#eef3fb;

  --card:#ffffff;
  --card-soft:#ffffff;
  --panel-top:rgba(255,255,255,.96);
  --panel-bottom:rgba(245,248,252,.96);

  --muted:#5f6f86;
  --text:#1a2433;
  --green:#0f9f61;
  --red:#d83a3a;
  --line:#d8e0ec;
  --shadow:0 8px 24px rgba(17,24,39,.08);

  --input-bg:#ffffff;
  --button-bg:#edf2fa;
  --button-bg-soft:#f4f7fb;
  --button-hover:#dfe8f5;

  --header-bg-1:rgba(255,255,255,.96);
  --header-bg-2:rgba(248,250,253,.92);

  --tab-bg:#f1f5fb;
  --tab-active-bg:#19c37d;
  --tab-active-text:#ffffff;

  --topic-border:rgba(26,36,51,.08);
  --keyword-border:rgba(26,36,51,.08);
  --keyword-bg:#f8fafc;
  --keyword-hover:#eef3f9;
  --title-list-border:rgba(26,36,51,.08);
  --title-list-bg:#fcfdff;
  --title-btn-bg:#ffffff;
  --title-btn-hover:#f3f7fc;
  --title-btn-active:rgba(25,195,125,.10);
  --title-btn-active-border:rgba(25,195,125,.45);

  --modal-bg:rgba(20,28,40,.72);
  --fb-overlay:rgba(20,28,40,.48);
  --fb-box-bg:#ffffff;

  --selected-bg:#d8ff85;
  --selected-text:#111;

  --img-caption:#5f6f86;
  --img-border:#d8e0ec;

  --mark-bg:#fff29a;
  --mark-text:#111;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans KR",Arial;
  background:radial-gradient(1200px 600px at 20% 0%,var(--bg-grad-1) 0%,var(--bg-grad-2) 60%);
  color:var(--text);
  font-size:14px;
  transition:background .25s ease,color .25s ease;
}
.wrap{max-width:1200px;margin:0 auto;padding:22px 16px 70px}

/* ===== HEADER ===== */
header{
  position:sticky;top:0;z-index:5;
  background:linear-gradient(180deg, var(--header-bg-1), var(--header-bg-2));
  border-bottom:1px solid var(--line);
  backdrop-filter: blur(6px);
}
.header-inner{
  max-width:1200px;
  margin:0 auto;
  padding:10px 16px 12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}
h1{margin:0;font-size:18px}
.sub{font-size:12px;color:var(--muted)}
.font-controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.font-controls button{
  width:32px;height:32px;
  font-size:12px;font-weight:800;
  border-radius:8px;
  border:1px solid var(--line);
  background:var(--button-bg);
  color:var(--text);
  cursor:pointer;
}
#themeToggle{
  width:auto;
  padding:8px 12px;
  height:32px;
  border-radius:10px;
  border:1px solid var(--line);
  background:var(--button-bg);
  color:var(--text);
  font-weight:900;
  white-space:nowrap;
}

/* ✅ 헤더 좌측(이름 옆) 탭 버튼 */
.header-left{
  display:flex;
  align-items:center;
  gap:12px;
  min-width:0;
}
.brand{min-width:0}
.tab-buttons{
  display:inline-flex;
  gap:6px;
  align-items:center;
}
.tab-btn{
  width:auto;
  padding:8px 12px;
  border-radius:10px;
  border:1px solid var(--line);
  background:var(--tab-bg);
  color:var(--text);
  cursor:pointer;
  font-weight:900;
  white-space:nowrap;
}
.tab-btn.active{
  background:var(--tab-active-bg);
  color:var(--tab-active-text);
  border-color:var(--tab-active-bg);
}

/* ✅ 모바일 헤더 깨짐 해결 */
@media(max-width:900px){
  .header-inner{flex-direction:column;align-items:stretch}
  .header-left{
    flex-direction:column;
    align-items:flex-start;
    gap:8px;
  }
  h1{
    font-size:16px;
    line-height:1.2;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:100%;
  }
  .sub{
    font-size:11px;
    line-height:1.2;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:100%;
  }
  .tab-buttons{width:100%;gap:6px}
  .tab-btn{
    padding:8px 10px;
    font-size:12px;
    border-radius:10px;
    flex:1;
  }
  .font-controls{justify-content:flex-end}
}

/* ✅ 탭 콘텐츠 display 제어 */
.tab-content{display:none}
.tab-content.active{display:block}

/* ===== PANEL ===== */
.panel{
  background:linear-gradient(180deg, var(--panel-top), var(--panel-bottom));
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  box-shadow:var(--shadow);
  margin-top:10px;
}
.controls{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:10px;
}
@media(max-width:900px){
  .controls{display:flex;flex-direction:column}
  .controls>div:last-child{order:-1}
}

label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
input,button{
  width:100%;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:var(--input-bg);
  color:var(--text);
}
button{cursor:pointer;font-weight:700;background:var(--button-bg)}

.topics{
  border:1px solid var(--line);
  border-radius:12px;
  padding:8px;
  max-height:220px;
  overflow-y:auto;
  background:var(--card);
}
.topic{
  display:flex;gap:8px;align-items:flex-start;
  padding:6px 4px;
  border-bottom:1px dashed var(--topic-border)
}
.topic:last-child{border-bottom:none}
.topic input{width:auto;margin-top:2px}
.topic span{font-size:13px}

.grid{display:grid;gap:12px;margin-top:14px}
.card{
  background:var(--card-soft);
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  box-shadow:var(--shadow);
}

/* title + badge */
.card-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
}
.title{font-weight:800}
.badge{font-size:12px;font-weight:800;text-align:right}
.ok{color:var(--green)}
.no{color:var(--red)}
.range{font-size:12px;color:var(--muted)}

.row{margin-top:6px}
.text{white-space:pre-line;line-height:1.5;font-size:13px;margin:0;padding:0}
mark{background:var(--mark-bg);color:var(--mark-text)}

.help-text{margin-top:4px;font-size:12px;color:var(--muted)}

/* ✅ 선택된 검사항목 title 형광 */
.selected-title{
  display:inline-block;
  background:var(--selected-bg);
  color:var(--selected-text);
  padding:2px 6px;
  border-radius:6px;
  line-height:1.3;
}

/* ✅ 적용기준만 보기 토글 */
.toggle-btn{
  width:auto;
  min-width:112px;
  padding:10px 14px;
  border-radius:12px;
  border:1px solid var(--line);
  background:var(--button-bg);
  color:var(--text);
  font-weight:900;
}
.toggle-btn.active{
  background:var(--tab-active-bg);
  color:var(--tab-active-text);
  border-color:var(--tab-active-bg);
}

/* ===== 이미지 확대 모달 ===== */
.image-modal{
  position:fixed;
  inset:0;
  background:var(--modal-bg);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  cursor:zoom-out;
}
.image-modal img{
  max-width:95%;
  max-height:95%;
  border-radius:8px;
  box-shadow:0 0 30px rgba(0,0,0,0.6);
}

/* ✅ 검색 돌아가기 버튼 */
#backToTopBtn{
  position:fixed;
  right:18px;
  bottom:18px;
  width:auto;
  padding:12px 14px;
  border-radius:14px;
  border:1px solid var(--line);
  background:var(--button-bg);
  color:var(--text);
  font-weight:800;
  cursor:pointer;
  box-shadow:var(--shadow);
  display:none;
  z-index:999;
  user-select:none;
}
#backToTopBtn:hover{background:var(--button-hover)}

/* ✅ 음성검색 버튼 */
#voiceBtn,
#stdVoiceBtn{
  width:auto;
  padding:15px 20px;
  border-radius:12px;
  border:1px solid var(--line);
  background:var(--button-bg);
  color:var(--text);
  cursor: pointer;
  font-weight:900;
  flex:0 0 auto;
}
#voiceBtn.listening,
#stdVoiceBtn.listening{
  border-color:var(--green);
  box-shadow:0 0 0 2px rgba(25,195,125,.15);
}

@media(max-width:900px){
  #search,#date,#stdSearch{font-size:16px;padding:14px;height:48px}
  #backToTopBtn{right:12px;bottom:12px;padding:11px 12px;border-radius:12px}
  .preset-row{
    display:grid !important;
    grid-template-columns:repeat(4, 1fr) !important;
    gap:4px !important;
    margin-bottom:6px !important;
  }
  .preset-row .preset{
    width:100%;
    padding:14px 2px;
    font-size:8.5px;
    letter-spacing:-0.2px;
    white-space:nowrap;
    text-align:center;
  }
  #voiceBtn,
  #stdVoiceBtn{padding:14px 12px;height:48px}
  .action-row{
    flex-wrap:wrap;
  }
  .action-row .toggle-btn,
  .action-row #reset{
    flex:1 1 auto;
    width:auto;
  }
}

/* ✅ 표준화자료 화면 */
.standard-wrap{margin-top:10px}
.std-panel{
  background:linear-gradient(180deg, var(--panel-top), var(--panel-bottom));
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  box-shadow:var(--shadow);
}
.std-toolbar{
  display:flex;
  gap:8px;
  align-items:center;
}
#stdSearch{
  flex:1;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:var(--input-bg);
  color:var(--text);
}
#stdClear{
  width:auto;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:var(--button-bg);
  color:var(--text);
  font-weight:800;
}
#stdVoiceStatus{
  margin-top:6px;
  font-size:12px;
  color:var(--muted);
  min-height:18px;
}

.std-chapters{
  margin-top:10px;
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px;
  background:var(--card-soft);
  max-height:290px;
  overflow-y:auto;
}
.std-chapters-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
  color:var(--muted);
  font-size:12px;
}
.std-chapters-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:6px;
}
.std-keyword-block{
  border:1px solid var(--keyword-border);
  border-radius:10px;
  background:var(--keyword-bg);
  overflow:hidden;
}
.std-keyword-btn{
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  padding:8px 10px;
  border:none;
  border-radius:0;
  background:transparent;
  color:var(--text);
  font-weight:800;
  font-size:12px;
  text-align:left;
}
.std-keyword-btn:hover{
  background:var(--keyword-hover);
}
.std-keyword-btn.active{
  background:rgba(25,195,125,.12);
}
.std-keyword-name{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.std-arrow{
  font-size:11px;
  color:var(--muted);
  flex:0 0 auto;
}
.std-title-list{
  display:none;
  border-top:1px solid var(--title-list-border);
  background:var(--title-list-bg);
  padding:4px 6px 6px;
}
.std-title-list.open{display:grid;gap:4px}
.std-title-btn{
  width:100%;
  text-align:left;
  padding:6px 8px;
  border-radius:8px;
  border:1px solid transparent;
  background:var(--title-btn-bg);
  color:var(--text);
  font-size:12px;
  font-weight:700;
  line-height:1.3;
}
.std-title-btn:hover{
  background:var(--title-btn-hover);
}
.std-title-btn.active{
  border-color:var(--title-btn-active-border);
  background:var(--title-btn-active);
}
.std-count{margin-top:10px;font-size:12px;color:var(--muted)}
.std-list{display:grid;gap:12px;margin-top:12px}
.std-item{
  background:var(--card-soft);
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  box-shadow:var(--shadow);
}
.std-item-top{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:flex-start;
}
.std-badge{
  font-size:11px;
  padding:4px 8px;
  border-radius:999px;
  border:1px solid var(--line);
  color:var(--muted);
  white-space:nowrap;
}
.std-title{
  margin:0;
  font-size:13px;
  font-weight:900;
  line-height:1.35;
}
.std-content{
  margin-top:10px;
  white-space:pre-line;
  line-height:1.5;
  opacity:.95;
  font-size:12.5px;
}
.std-empty{
  padding:18px;border:1px dashed var(--line);border-radius:14px;
  color:var(--muted);text-align:center;
  background:var(--card);
}
.std-apply{
  margin-top:8px;
  font-size:12px;
  color:var(--muted);
}

/* =========================
   ✅ 피드백 버튼 + 모달
   ========================= */
#feedbackBtn{
  width:auto;height:32px;padding:8px 12px;border-radius:10px;border:1px solid var(--line);
  background:var(--button-bg);color:var(--text);cursor:pointer;
  font-weight:900;white-space:nowrap;display:inline-flex;align-items:center;justify-content:center;
}
#feedbackBtn:hover{background:var(--button-hover)}
.fb-modal{
  position:fixed;inset:0;background:var(--fb-overlay);display:none;
  align-items:center;justify-content:center;z-index:12000;
}
.fb-box{
  width:min(820px, 92vw);height:min(720px, 88vh);
  background:var(--fb-box-bg);border:1px solid var(--line);border-radius:16px;
  box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;
}
.fb-head{
  display:flex;justify-content:space-between;align-items:center;gap:10px;
  padding:10px 12px;border-bottom:1px solid var(--title-list-border);
}
.fb-title{font-weight:900}
.fb-close{
  width:auto;padding:6px 10px;border-radius:10px;border:1px solid var(--line);
  background:var(--button-bg-soft);color:var(--text);cursor:pointer;font-weight:900;
}
.fb-iframe{width:100%;height:100%;border:0;background:#fff}

/* =========================
   ✅ GA4 전송 확인 UI (추가)
   ========================= */
#gaBadge{
  width:auto;
  height:32px;
  padding:6px 10px;
  border-radius:10px;
  border:1px solid var(--line);
  background:var(--button-bg-soft);
  color:var(--text);
  cursor:pointer;
  font-weight:900;
  white-space:nowrap;
  display:inline-flex;
  align-items:center;
  gap:8px;
}
#gaDot{
  width:10px;height:10px;border-radius:99px;
  background:#9fb0d0;
  box-shadow:0 0 0 2px rgba(159,176,208,.15);
}
.ga-ok #gaDot{background:var(--green); box-shadow:0 0 0 2px rgba(25,195,125,.18)}
.ga-bad #gaDot{background:var(--red);   box-shadow:0 0 0 2px rgba(255,77,79,.18)}

#gaPanel{
  position:fixed;
  top:72px;
  right:18px;
  width:min(420px, 92vw);
  max-height:62vh;
  overflow:auto;
  background:var(--fb-box-bg);
  border:1px solid var(--line);
  border-radius:14px;
  box-shadow:var(--shadow);
  z-index:13000;
  display:none;
}
.gaPanelHead{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border-bottom:1px solid var(--title-list-border);
}
.gaPanelTitle{font-weight:900}
.gaPanelClose{
  width:auto;
  padding:6px 10px;
  border-radius:10px;
  border:1px solid var(--line);
  background:var(--button-bg-soft);
  color:var(--text);
  cursor:pointer;
  font-weight:900;
}
.gaPanelBody{padding:10px 12px}
.gaLine{font-size:12px;line-height:1.45;color:var(--muted);white-space:pre-wrap}
.gaLine strong{color:var(--text)}
.gaHint{
  margin-top:10px;
  padding:10px;
  border-radius:12px;
  border:1px dashed var(--line);
  color:var(--muted);
  font-size:12px;
  line-height:1.45;
  background:var(--card);
}
.gaBtnRow{display:flex;gap:6px;margin-top:10px}
.gaBtnRow button{
  width:auto;
  padding:8px 10px;
  border-radius:10px;
  border:1px solid var(--line);
  background:var(--button-bg-soft);
  color:var(--text);
  font-weight:900;
}
</style>

  });
</script>

<body>

<header>
  <div class="header-inner">

    <div class="header-left">
      <div class="brand">
        <h1>승강기 검사기준 시뮬레이터</h1>
        <div class="sub">건축허가일 기반 검사기준 자동 판별</div>
      </div>

      <div class="tab-buttons" aria-label="화면 전환 탭">
        <button class="tab-btn active" type="button" data-tab="criteria">검사기준</button>
        <button class="tab-btn" type="button" data-tab="standard">표준화자료</button>
      </div>
    </div>

    <div class="font-controls">
      <button id="themeToggle" type="button" title="화면 모드 전환">☀️ 화이트모드</button>

      <button id="gaBadge" type="button" title="GA4 전송 상태 보기">
        <span id="gaDot"></span>
        <span id="gaText">GA 확인중…</span>
      </button>

      <button id="feedbackBtn" type="button" title="익명 피드백 남기기">피드백</button>
      <button id="increase-font" type="button">A+</button>
      <button id="decrease-font" type="button">A−</button>
    </div>

  </div>
</header>

<div class="wrap">

  <section id="criteria" class="tab-content active">

    <div class="panel">
      <div class="controls">

        <div>

<script>
(() => {
  const MEASUREMENT_ID = "G-YR8SYEVY0J";

  const badge = document.getElementById('gaBadge');
  const text = document.getElementById('gaText');

  const panel = document.getElementById('gaPanel');
  const closeBtn = document.getElementById('gaClose');
  const locEl = document.getElementById('gaLoc');
  const idEl = document.getElementById('gaIdTxt');
  const statusEl = document.getElementById('gaStatus');
  const logsEl = document.getElementById('gaLogs');
  const sendPingBtn = document.getElementById('gaSendPing');
  const clearBtn = document.getElementById('gaClearLogs');

  const maxLogs = 20;
  const logs = [];

  function fmtTime(d){
    const hh = String(d.getHours()).padStart(2,'0');
    const mm = String(d.getMinutes()).padStart(2,'0');
    const ss = String(d.getSeconds()).padStart(2,'0');
    return `${hh}:${mm}:${ss}`;
  }
  function pushLog(msg){
    logs.unshift(`[${fmtTime(new Date())}] ${msg}`);
    if (logs.length > maxLogs) logs.pop();
    logsEl.textContent = logs.join("\n");
  }
  function setBadge(state, msg){
    badge.classList.remove('ga-ok','ga-bad');
    if(state === 'ok') badge.classList.add('ga-ok');
    if(state === 'bad') badge.classList.add('ga-bad');
    text.textContent = msg;
    statusEl.textContent = msg;
  }

  locEl.textContent = location.href;
  idEl.textContent = MEASUREMENT_ID;

  const hasGtag = (typeof window.gtag === "function");
  if (!hasGtag) {
    setBadge('bad', "GA 스크립트 미로딩/차단");
    pushLog("gtag() 없음: 스니펫 누락 또는 차단 가능");
  } else {
    setBadge('ok', "GA 로딩됨(전송 확인 필요)");
    pushLog("gtag() 감지됨: 스크립트 로딩 OK");
  }

  function sendTestPing(){
    if (typeof window.gtag !== "function") {
      setBadge('bad', "gtag 없음(전송 불가)");
      pushLog("테스트 전송 실패: gtag() 없음");
      return;
    }
    const eid = "debug_ping_" + Math.random().toString(16).slice(2);
    window.gtag('event', 'debug_ping', {
      event_id: eid,
      page_location: location.href
    });
    pushLog(`테스트 전송 호출: debug_ping (event_id=${eid})`);
    setBadge('ok', "테스트 전송 호출됨");
  }

  function openPanel(){
    panel.style.display = 'block';
    panel.setAttribute('aria-hidden','false');
  }
  function closePanel(){
    panel.style.display = 'none';
    panel.setAttribute('aria-hidden','true');
  }
  badge.addEventListener('click', () => {
    const opened = panel.style.display === 'block';
    opened ? closePanel() : openPanel();
  });
  closeBtn.addEventListener('click', closePanel);

  sendPingBtn.addEventListener('click', sendTestPing);
  clearBtn.addEventListener('click', () => {
    logs.length = 0;
    logsEl.textContent = "";
  });

  setTimeout(sendTestPing, 800);

})();
</script>

const tabButtons = document.querySelectorAll(".tab-btn");

  });
}

function updateAppliedOnlyButton(){
  if(!appliedOnlyBtn) return;
  appliedOnlyBtn.classList.toggle('active', appliedOnly);
  appliedOnlyBtn.textContent = appliedOnly ? '적용기준만 보기 ON' : '적용기준만 보기 OFF';
}

function norm(s){
  return (s||'').toLowerCase().replace(/\s+/g,'');
}

function passFilter(hayRaw, qRaw){
  const hay = norm(hayRaw);
  const q = norm(qRaw);
  if(!q) return true;

  if(q.length >= 2){
    for(let i=0;i<q.length-1;i++){
      const bi = q.slice(i,i+2);
      if(hay.includes(bi)) return true;
    }
    return false;
  }
  return true;
}

function scoreMatch(hayRaw, qRaw){
  const hay = norm(hayRaw);
  const q = norm(qRaw);
  if(!q) return 0;

  const chars = new Set([...q]);
  let charHit = 0;
  chars.forEach(ch => { if(hay.includes(ch)) charHit++; });

  let biHit = 0;
  if(q.length >= 2){
    for(let i=0;i<q.length-1;i++){
      const bi = q.slice(i,i+2);
      if(hay.includes(bi)) biHit++;
    }
  }

  return (charHit * 1) + (biHit * 3);
}

function getRankedMatches(query, selectedTitles){
  const qRaw = query || "";
  const q = norm(qRaw);
  if(!q) return [];

  let pool = [];
  for(let idx=0; idx<DATA.length; idx++){
    const i = DATA[idx];
    const hayAll = (i.title||"") + " " + (i.label||"") + " " + (i.text||"");
    if(passFilter(hayAll, qRaw)) pool.push({i, idx});
  }

  if(pool.length === 0){
    for(let idx=0; idx<DATA.length; idx++){
      pool.push({i: DATA[idx], idx});
    }
  }

  const ranked = pool.map(({i, idx})=>{
    const total =
      scoreMatch(i.title, qRaw) * 2 +
      scoreMatch(i.text,  qRaw) * 1 +
      scoreMatch(i.label, qRaw) * 1;

    return {i, idx, total};
  }).filter(x => x.total > 0);

  ranked.sort((a,b)=>{
    const ap = selectedTitles.has(a.i.title) ? 0 : 1;
    const bp = selectedTitles.has(b.i.title) ? 0 : 1;
    if(ap !== bp) return ap - bp;
    if(b.total !== a.total) return b.total - a.total;
    return a.idx - b.idx;
  });

  return ranked.slice(0, 120);
}

fetch('./data/criteria.json')
.then(r=>r.json())
.then(j=>{
  DATA=j.criteria||[];
  DATA.forEach(i=>{
    if(!TITLE_MAP[i.title]) TITLE_MAP[i.title]=[];
    TITLE_MAP[i.title].push(i);

  renderTopics();
  renderResults();
})
.catch(()=>{

    </div>
  `;
});

function renderTopics(){
  if(!topicsEl) return;
  topicsEl.innerHTML='';
  const qRaw = search.value || "";
  const q = norm(qRaw);

  const titles = Object.keys(TITLE_MAP);

  let show = titles;
  if(q){
    show = titles
      .map(t => {
        const s = scoreMatch(t, qRaw);
        const p = passFilter(t, qRaw);
        return { t, s, p };
      })
      .filter(x => x.p || x.s > 0)
      .sort((a,b)=> (b.s - a.s) || a.t.localeCompare(b.t, 'ko'))
      .slice(0, 200)
      .map(x => x.t);
  }

  show.forEach(t=>{
    const l=document.createElement('label');
    l.className='topic';

    c.onchange=renderResults;

function isApplied(d,f,t){
  if(!d) return false;
  const b=new Date(d);
  if(f && b<new Date(f)) return false;
  if(t && b>new Date(t)) return false;
  return true;
}

function highlight(text, keyword){
  if(!text || !keyword) return text;

  const rawKeywords = [...new Set(
    keyword
      .split(/[\s,]+/)
      .map(s => s.trim())
      .filter(Boolean)
      .sort((a,b) => b.length - a.length)
  )];

  if(!rawKeywords.length) return text;

  const ranges = [];

  rawKeywords.forEach(word => {
    const target = word.replace(/\s+/g, '');
    if(!target) return;

    let compact = '';
    const map = [];

    for(let i=0; i<text.length; i++){
      const ch = text[i];
      if(/\s/.test(ch)) continue;
      compact += ch;
      map.push(i);
    }

    let start = 0;
    while(true){
      const idx = compact.toLowerCase().indexOf(target.toLowerCase(), start);
      if(idx === -1) break;

      const origStart = map[idx];
      const origEnd = map[idx + target.length - 1] + 1;
      ranges.push([origStart, origEnd]);

      start = idx + target.length;
    }
  });

  if(!ranges.length) return text;

  ranges.sort((a,b) => a[0] - b[0]);
  const merged = [];
  for(const [s,e] of ranges){
    if(!merged.length || s > merged[merged.length - 1][1]){
      merged.push([s,e]);
    }else{
      merged[merged.length - 1][1] = Math.max(merged[merged.length - 1][1], e);
    }
  }

  let result = '';
  let last = 0;
  for(const [s,e] of merged){
    result += text.slice(last, s);
    result += '<mark>' + text.slice(s, e) + '</mark>';
    last = e;
  }
  result += text.slice(last);

  return result;
}

function getSelectedTitles(){
  const set=new Set();
  document.querySelectorAll('#topics input:checked').forEach(cb=>set.add(cb.value));
  return set;
}

function renderResults(){
  if(!resultsEl) return;
  resultsEl.innerHTML='';
  const selectedTitles = getSelectedTitles();

  const keywordRaw = search.value || "";
  const keyword = norm(keywordRaw);

  let matches = [];

  if (keyword) {
    matches = getRankedMatches(keywordRaw, selectedTitles).map(x => ({ i: x.i }));
  } else {
    document.querySelectorAll('#topics input:checked').forEach(cb=>{
      (TITLE_MAP[cb.value]||[]).forEach(i=>matches.push({i}));
    });
  }

  if(appliedOnly){
    matches = matches.filter(({i}) => isApplied(dateEl.value, i.from, i.to));
  }

  if(!matches.length){
    const msg = appliedOnly
      ? '적용기준만 보기 조건에 맞는 결과가 없습니다. 건축허가일을 입력했는지 확인하거나 토글을 꺼보세요.'
      : '검색어를 더 구체적으로 입력하거나, 검사항목을 선택해보세요.';

    resultsEl.innerHTML = `
      <div class="card">
        <div class="title">검색 결과가 없습니다.</div>
        <div class="row"><div class="text">${msg}</div></div>
      </div>
    `;
    return;
  }

  matches.forEach(({i})=>{
    const applied = isApplied(dateEl.value,i.from,i.to);
    const isSelected = selectedTitles.has(i.title);
    const titleHtml = isSelected
      ? `<span class="selected-title">${highlight(i.title,search.value)}</span>`
      : `${highlight(i.title,search.value)}`;

    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`
      <div class="card-header">
        <div class="title">${titleHtml}</div>
        <div class="badge ${applied?'ok':'no'}">
          ${applied?'🟩 적용':'🟥 미적용'}
          <div class="range">${i.from||'—'} ~ ${i.to||'현재'}</div>
        </div>
      </div>

      <div class="row">
        <div class="text">
          ${highlight(i.text,search.value)}
        </div>
      </div>

      ${renderImage(i.image)}
    `;
    resultsEl.appendChild(card);
  });
}

(() => {
  const voiceBtn = document.getElementById('voiceBtn');
  const voiceStatus = document.getElementById('voiceStatus');

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    voiceBtn.disabled = true;
    voiceStatus.textContent = "음성인식 미지원 브라우저입니다. (PC 크롬 권장)";
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "ko-KR";
  recognition.interimResults = true;
  recognition.continuous = false;

  let listening = false;
  const setStatus = (msg) => { voiceStatus.textContent = msg || ""; };

  voiceBtn.addEventListener('click', () => {
    if (listening) { recognition.stop(); return; }
    try {
      listening = true;
      voiceBtn.classList.add('listening');
      setStatus("🎙️ 듣는 중… 말씀하세요");
      recognition.start();
    } catch (e) {
      listening = false;
      voiceBtn.classList.remove('listening');
      setStatus("음성인식 시작 실패. 다시 눌러주세요.");
    }
  });

  recognition.onresult = (event) => {
    let interim = "";
    let finalText = "";
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) finalText += t;
      else interim += t;
    }
    const text = (finalText || interim || "").trim();
    search.value = text;
    search.dispatchEvent(new Event("input", { bubbles: true }));
    if (finalText) setStatus(`인식됨: ${finalText.trim()}`);
  };

  recognition.onerror = (event) => { setStatus(`음성인식 오류: ${event.error}`); };

  recognition.onend = () => {
    listening = false;
    voiceBtn.classList.remove('listening');
  };
})();

  return (str ?? "").toString()
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function buildStdKeywordMap(){
  STD_KEYWORD_MAP = {};
  STD_DATA.forEach(item=>{
    const key = item.keyword || "기타";
    if(!STD_KEYWORD_MAP[key]) STD_KEYWORD_MAP[key] = [];
    STD_KEYWORD_MAP[key].push(item);
  });
}

function fetchStandardData(){
  if(stdLoaded) return Promise.resolve();
  return fetch('./data/standardization.json')
    .then(r=>r.json())
    .then(j=>{
      STD_DATA = Array.isArray(j) ? j : (j.standardization || []);
      buildStdKeywordMap();
      stdLoaded = true;
    })
    .catch(()=>{
      STD_DATA = [];
      STD_KEYWORD_MAP = {};
      stdLoaded = true;
    });
}

function getStdRankedMatches(query){
  const qRaw = query || "";
  const q = norm(qRaw);
  if(!q) return [];

  let pool = [];
  for(let idx=0; idx<STD_DATA.length; idx++){
    const i = STD_DATA[idx];
    const hayAll = (i.keyword||"") + " " + (i.title||"") + " " + (i.label||"") + " " + (i.text||"");
    if(passFilter(hayAll, qRaw)) pool.push({i, idx});
  }

  if(pool.length === 0){
    for(let idx=0; idx<STD_DATA.length; idx++){
      pool.push({i: STD_DATA[idx], idx});
    }
  }

  const ranked = pool.map(({i, idx})=>{
    const total =
      scoreMatch(i.keyword, qRaw) * 3 +
      scoreMatch(i.title, qRaw)   * 2 +
      scoreMatch(i.text, qRaw)    * 1 +
      scoreMatch(i.label, qRaw)   * 1;

    return {i, idx, total};
  }).filter(x => x.total > 0);

  ranked.sort((a,b)=>{
    if (stdSelectedTitle === a.i.title && stdSelectedTitle !== b.i.title) return -1;
    if (stdSelectedTitle === b.i.title && stdSelectedTitle !== a.i.title) return 1;
    if(b.total !== a.total) return b.total - a.total;
    return a.idx - b.idx;
  });

  return ranked.slice(0, 120);
}

function renderStdTree(){
  const wrap = document.getElementById("stdChapters");
  if(!wrap) return;

  const qRaw = (document.getElementById("stdSearch") || {}).value || "";
  const keywords = Object.keys(STD_KEYWORD_MAP);

  let showKeywords = keywords;
  if(qRaw){
    showKeywords = keywords
      .map(k=>{
        const related = STD_KEYWORD_MAP[k] || [];
        const score =
          scoreMatch(k, qRaw) * 3 +
          related.reduce((sum, item)=> sum + scoreMatch(item.title, qRaw) * 2 + scoreMatch(item.text, qRaw), 0);
        const pass =
          passFilter(k, qRaw) ||
          related.some(item => passFilter((item.title||"") + " " + (item.text||"") + " " + (item.label||""), qRaw));
        return { k, score, pass };
      })
      .filter(x => x.pass || x.score > 0)
      .sort((a,b)=> (b.score - a.score) || a.k.localeCompare(b.k, 'ko'))
      .map(x => x.k);
  }

  if(!showKeywords.length){
    wrap.innerHTML = `<div class="std-empty">일치하는 키워드가 없습니다.</div>`;
    return;
  }

  wrap.innerHTML = `
    <div class="std-chapters-head">
      <span>키워드 선택</span>
      <span>키워드를 누르면 제목이 펼쳐집니다</span>
    </div>
    <div class="std-chapters-grid">
      ${showKeywords.map(keyword=>{
        const titles = STD_KEYWORD_MAP[keyword] || [];
        const filteredTitles = qRaw
          ? titles
              .map(item=>{
                const score =
                  scoreMatch(item.title, qRaw) * 2 +
                  scoreMatch(item.keyword, qRaw) * 3 +
                  scoreMatch(item.text, qRaw) +
                  scoreMatch(item.label, qRaw);
                const pass = passFilter((item.keyword||"") + " " + (item.title||"") + " " + (item.text||"") + " " + (item.label||""), qRaw);
                return { item, score, pass };
              })
              .filter(x => x.pass || x.score > 0)
              .sort((a,b)=> (b.score - a.score) || a.item.title.localeCompare(b.item.title, 'ko'))
              .map(x => x.item)
          : titles;

        const isOpen = stdOpenKeyword === keyword;
        return `
          <div class="std-keyword-block">
            <button class="std-keyword-btn ${isOpen ? 'active' : ''}" type="button" data-keyword="${stdEscapeHtml(keyword)}">
              <span class="std-keyword-name">${highlight(stdEscapeHtml(keyword), qRaw)}</span>
              <span class="std-arrow">${isOpen ? '▲' : '▼'}</span>
            </button>
            <div class="std-title-list ${isOpen ? 'open' : ''}">
              ${filteredTitles.map(item=>`
                <button
                  class="std-title-btn ${stdSelectedTitle === item.title ? 'active' : ''}"
                  type="button"
                  data-title="${stdEscapeHtml(item.title)}"
                  data-keyword="${stdEscapeHtml(keyword)}">
                  ${highlight(stdEscapeHtml(item.title), qRaw)}
                </button>
              `).join("") || `<div class="std-empty" style="padding:10px;font-size:12px">표시할 제목이 없습니다.</div>`}
            </div>
          </div>
        `;
      }).join("")}
    </div>
  `;
}

function renderStdList(){
  const listEl = document.getElementById("stdList");
  const countEl = document.getElementById("stdCount");
  if(!listEl) return;

  if(!stdLoaded){
    listEl.innerHTML = `<div class="std-empty">표준화자료를 불러오는 중입니다.</div>`;
    return;
  }

  if(!STD_DATA.length){
    listEl.innerHTML = `<div class="std-empty">./data/standardization.json 경로와 파일명을 확인하세요.</div>`;
    if(countEl) countEl.textContent = `검색 결과: 0건`;
    return;
  }

  const qRaw = (document.getElementById("stdSearch") || {}).value || "";
  let list = [];

  if(norm(qRaw)){
    list = getStdRankedMatches(qRaw).map(x => x.i);
  }else if(stdSelectedTitle){
    list = STD_DATA.filter(item => item.title === stdSelectedTitle);
  }else{
    list = [];
  }

  if(countEl) countEl.textContent = `검색 결과: ${list.length}건`;

  if(!list.length){
    listEl.innerHTML = `<div class="std-empty">검색어를 입력하거나 키워드에서 제목을 선택해보세요.</div>`;
    return;
  }

  listEl.innerHTML = list.map(item=>{
    const titleHtml = stdSelectedTitle === item.title
      ? `<span class="selected-title">${highlight(stdEscapeHtml(item.title), qRaw)}</span>`
      : `${highlight(stdEscapeHtml(item.title), qRaw)}`;

    return `
      <div class="std-item">
        <div class="std-item-top">
          <h3 class="std-title">${titleHtml}</h3>
          <div class="std-badge">${highlight(stdEscapeHtml(item.keyword || ''), qRaw)}</div>
        </div>
        <div class="std-content">${highlight(stdEscapeHtml(item.text || ''), qRaw)}</div>
        <div class="std-apply">적용시점 : ${stdEscapeHtml(item.from || '—')}</div>
        ${renderImage(item.image)}
      </div>
    `;
  }).join("");
}

function bindStdEvents(){
  const stdSearch = document.getElementById("stdSearch");
  const stdClear = document.getElementById("stdClear");
  const stdChapters = document.getElementById("stdChapters");

  if(stdSearch){
    stdSearch.addEventListener("input", ()=>{
      renderStdTree();
      renderStdList();
    });
  }

  if(stdClear){
    stdClear.addEventListener("click", ()=>{
      if(stdSearch) stdSearch.value = "";
      stdSelectedTitle = null;
      stdOpenKeyword = null;
      renderStdTree();
      renderStdList();
    });
  }

  if(stdChapters){
    stdChapters.addEventListener("click", (e)=>{
      const keywordBtn = e.target.closest(".std-keyword-btn");
      const titleBtn = e.target.closest(".std-title-btn");

      if(keywordBtn){
        const keyword = keywordBtn.dataset.keyword;
        stdOpenKeyword = (stdOpenKeyword === keyword) ? null : keyword;
        renderStdTree();
        return;
      }

      if(titleBtn){
        stdSelectedTitle = titleBtn.dataset.title;
        stdOpenKeyword = titleBtn.dataset.keyword || stdOpenKeyword;
        renderStdTree();
        renderStdList();
      }
    });
  }
}

function initStandardTab(){
  if(stdInitialized) return;
  stdInitialized = true;

  fetchStandardData().then(()=>{
    renderStdTree();
    bindStdEvents();
    renderStdList();
  });
}

initStandardTab();

(() => {
  const stdVoiceBtn = document.getElementById('stdVoiceBtn');
  const stdVoiceStatus = document.getElementById('stdVoiceStatus');
  const stdSearch = document.getElementById('stdSearch');

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    stdVoiceBtn.disabled = true;
    stdVoiceStatus.textContent = "음성인식 미지원 브라우저입니다. (PC 크롬 권장)";
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "ko-KR";
  recognition.interimResults = true;
  recognition.continuous = false;

  let listening = false;
  const setStatus = (msg) => { stdVoiceStatus.textContent = msg || ""; };

  stdVoiceBtn.addEventListener('click', () => {
    if (listening) { recognition.stop(); return; }
    try {
      listening = true;
      stdVoiceBtn.classList.add('listening');
      setStatus("🎙️ 듣는 중… 말씀하세요");
      recognition.start();
    } catch (e) {
      listening = false;
      stdVoiceBtn.classList.remove('listening');
      setStatus("음성인식 시작 실패. 다시 눌러주세요.");
    }
  });

  recognition.onresult = (event) => {
    let interim = "";
    let finalText = "";
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) finalText += t;
      else interim += t;
    }
    const text = (finalText || interim || "").trim();
    stdSearch.value = text;
    stdSearch.dispatchEvent(new Event("input", { bubbles: true }));
    if (finalText) setStatus(`인식됨: ${finalText.trim()}`);
  };

  recognition.onerror = (event) => { setStatus(`음성인식 오류: ${event.error}`); };

  recognition.onend = () => {
    listening = false;
    stdVoiceBtn.classList.remove('listening');
  };
})();

(() => {
  const FB_FORM_URL = "https://naver.me/5xgAWwSb";

  const btn = document.getElementById('feedbackBtn');
  const modal = document.getElementById('fbModal');
  const closeBtn = document.getElementById('fbClose');
  const frame = document.getElementById('fbFrame');

  if(!btn || !modal || !closeBtn || !frame) return;

  frame.src = FB_FORM_URL;

  const open = () => {
    modal.style.display = 'flex';
    modal.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  };

  const close = () => {
    modal.style.display = 'none';
    modal.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
  };

  btn.addEventListener('click', open);
  closeBtn.addEventListener('click', close);

  modal.addEventListener('click', (e) => { if(e.target === modal) close(); });

  window.addEventListener('keydown', (e) => {
    if(e.key === 'Escape' && modal.style.display === 'flex') close();
  });
})();
</script>
