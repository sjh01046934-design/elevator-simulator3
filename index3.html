<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>승강기 검사기준 시뮬레이터</title>

<style>
:root{
  --bg:#0b1220; --card:#111b2e; --muted:#9fb0d0; --text:#e7eefc;
  --green:#19c37d; --red:#ff4d4f; --line:#22314f;
  --shadow:0 10px 30px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans KR",Arial;
  background:radial-gradient(1200px 600px at 20% 0%,#14234a 0%,var(--bg) 60%);
  color:var(--text);
  font-size:14px;
}
.wrap{max-width:1200px;margin:0 auto;padding:22px 16px 70px}

/* ===== HEADER ===== */
header{
  position:sticky;top:0;z-index:5;
  background:linear-gradient(180deg, rgba(11,18,32,.98), rgba(11,18,32,.92));
  border-bottom:1px solid var(--line);
  backdrop-filter: blur(6px);
}
.header-inner{
  max-width:1200px;
  margin:0 auto;
  padding:10px 16px 12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}
h1{margin:0;font-size:18px}
.sub{font-size:12px;color:var(--muted)}
.font-controls{display:flex;gap:6px;align-items:center}
.font-controls button{
  width:32px;height:32px;
  font-size:12px;font-weight:800;
  border-radius:8px;
  border:1px solid var(--line);
  background:rgba(22,37,69,.85);
  color:var(--text);
  cursor:pointer;
}

/* ✅ 헤더 좌측(이름 옆) 탭 버튼 */
.header-left{
  display:flex;
  align-items:center;
  gap:12px;
  min-width:0;
}
.brand{min-width:0}
.tab-buttons{
  display:inline-flex;
  gap:6px;
  align-items:center;
}
.tab-btn{
  width:auto;
  padding:8px 12px;
  border-radius:10px;
  border:1px solid var(--line);
  background:rgba(22,37,69,.55);
  color:var(--text);
  cursor:pointer;
  font-weight:900;
  white-space:nowrap;
}
.tab-btn.active{
  background:rgba(25,195,125,.95);
  color:#00120a;
  border-color:rgba(25,195,125,.95);
}

/* ✅ 모바일 헤더 깨짐 해결 */
@media(max-width:900px){
  .header-inner{flex-direction:column;align-items:stretch}
  .header-left{
    flex-direction:column;
    align-items:flex-start;
    gap:8px;
  }
  h1{
    font-size:16px;
    line-height:1.2;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:100%;
  }
  .sub{
    font-size:11px;
    line-height:1.2;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:100%;
  }
  .tab-buttons{width:100%;gap:6px}
  .tab-btn{
    padding:8px 10px;
    font-size:12px;
    border-radius:10px;
    flex:1;
  }
  .font-controls{justify-content:flex-end}
}

/* ✅ 탭 콘텐츠 display 제어 */
.tab-content{display:none}
.tab-content.active{display:block}

/* ===== PANEL ===== */
.panel{
  background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  box-shadow:var(--shadow);
  margin-top:10px;
}
.controls{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:10px;
}
@media(max-width:900px){
  .controls{display:flex;flex-direction:column}
  .controls>div:last-child{order:-1}
}

label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
input,button{
  width:100%;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:rgba(10,16,30,.55);
  color:var(--text);
}
button{cursor:pointer;font-weight:700;background:rgba(22,37,69,.85)}

.topics{
  border:1px solid var(--line);
  border-radius:12px;
  padding:8px;
  max-height:220px;
  overflow-y:auto;
}
.topic{
  display:flex;gap:8px;align-items:flex-start;
  padding:6px 4px;
  border-bottom:1px dashed rgba(255,255,255,.08)
}
.topic:last-child{border-bottom:none}
.topic input{width:auto;margin-top:2px}
.topic span{font-size:13px}

.grid{display:grid;gap:12px;margin-top:14px}
.card{
  background:rgba(17,27,46,.72);
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
}

/* title + badge */
.card-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
}
.title{font-weight:800}
.badge{font-size:12px;font-weight:800;text-align:right}
.ok{color:var(--green)}
.no{color:var(--red)}
.range{font-size:12px;color:var(--muted)}

.row{margin-top:6px}
.text{white-space:pre-line;line-height:1.5;font-size:13px;margin:0;padding:0}
mark{background:yellow;color:black}

.help-text{margin-top:4px;font-size:12px;color:var(--muted)}

/* ✅ 선택된 검사항목 title 형광 */
.selected-title{
  display:inline-block;
  background:#b6ff5c;
  color:#000;
  padding:2px 6px;
  border-radius:6px;
  line-height:1.3;
}

/* ===== 이미지 확대 모달 ===== */
.image-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  cursor:zoom-out;
}
.image-modal img{
  max-width:95%;
  max-height:95%;
  border-radius:8px;
  box-shadow:0 0 30px rgba(0,0,0,0.6);
}

/* ✅ 검색 돌아가기 버튼 */
#backToTopBtn{
  position:fixed;
  right:18px;
  bottom:18px;
  width:auto;
  padding:12px 14px;
  border-radius:14px;
  border:1px solid var(--line);
  background:rgba(22,37,69,.92);
  color:var(--text);
  font-weight:800;
  cursor:pointer;
  box-shadow:var(--shadow);
  display:none;
  z-index:999;
  user-select:none;
}
#backToTopBtn:hover{background:rgba(35,60,105,.95)}

/* ✅ 음성검색 버튼 */
#voiceBtn{
  width:auto;
  padding:15px 20px;
  border-radius:12px;
  border:1px solid var(--line);
  background:rgba(22,37,69,.85);
  color:var(--text);
  cursor:pointer;
  font-weight:900;
  flex:0 0 auto;
}
#voiceBtn.listening{
  border-color:var(--green);
  box-shadow:0 0 0 2px rgba(25,195,125,.15);
}

@media(max-width:900px){
  #search,#date{font-size:16px;padding:14px;height:48px}
  #backToTopBtn{right:12px;bottom:12px;padding:11px 12px;border-radius:12px}
  .preset-row{
    display:grid !important;
    grid-template-columns:repeat(4, 1fr) !important;
    gap:4px !important;
    margin-bottom:6px !important;
  }
  .preset-row .preset{
    width:100%;
    padding:14px 2px;
    font-size:8.5px;
    letter-spacing:-0.2px;
    white-space:nowrap;
    text-align:center;
  }
  #voiceBtn{padding:14px 12px;height:48px}
}

/* ✅ 표준화자료 화면 */
.standard-wrap{margin-top:10px}
.std-panel{
  background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  box-shadow:var(--shadow);
}
.std-toolbar{display:flex;gap:8px;align-items:center}
#stdSearch{
  flex:1;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:rgba(10,16,30,.55);
  color:var(--text);
}
#stdClear{
  width:auto;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:rgba(22,37,69,.85);
  color:var(--text);
  font-weight:800;
}
.std-chapters{
  margin-top:10px;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  background:rgba(17,27,46,.45);
}
.std-chapters-head{
  display:flex;justify-content:space-between;align-items:center;gap:10px;
  margin-bottom:10px;color:var(--muted);font-size:12px;
}
.std-chapters-actions{display:flex;gap:6px}
.std-chapters-actions button{
  width:auto;padding:6px 10px;border-radius:10px;border:1px solid var(--line);
  background:rgba(22,37,69,.6);color:var(--text);font-weight:800;
}
.std-chapters-grid{
  display:grid;
  grid-template-columns:repeat(2, minmax(0, 1fr));
  gap:8px;
}
@media(max-width:900px){.std-chapters-grid{grid-template-columns:1fr}}
.std-chk{
  display:flex;gap:8px;align-items:flex-start;
  padding:6px 6px;border-radius:12px;
  border:1px solid rgba(255,255,255,.06);
  background:rgba(10,16,30,.25);
}
.std-chk input{width:auto;margin-top:2px}
.std-chk span{font-size:13px;line-height:1.35}
.std-count{margin-top:10px;font-size:12px;color:var(--muted)}
.std-list{display:grid;gap:12px;margin-top:12px}
.std-item{
  background:rgba(17,27,46,.72);
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
}
.std-item-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.std-badge{
  font-size:12px;padding:4px 8px;border-radius:999px;border:1px solid var(--line);
  color:var(--muted);white-space:nowrap;
}
.std-title{margin:0;font-size:14px;font-weight:900;line-height:1.35}
.std-tags{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
.std-tag{
  font-size:12px;padding:3px 8px;border-radius:999px;
  border:1px solid rgba(255,255,255,.10);color:var(--muted);
}
.std-content{margin-top:10px;white-space:pre-line;line-height:1.5;opacity:.95}
.std-empty{
  padding:18px;border:1px dashed var(--line);border-radius:14px;
  color:var(--muted);text-align:center;
}

/* =========================
   ✅ 피드백 버튼 + 모달
   ========================= */
#feedbackBtn{
  width:auto;height:32px;padding:8px 12px;border-radius:10px;border:1px solid var(--line);
  background:rgba(22,37,69,.85);color:var(--text);cursor:pointer;
  font-weight:900;white-space:nowrap;display:inline-flex;align-items:center;justify-content:center;
}
#feedbackBtn:hover{background:rgba(35,60,105,.95)}
.fb-modal{
  position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;
  align-items:center;justify-content:center;z-index:12000;
}
.fb-box{
  width:min(820px, 92vw);height:min(720px, 88vh);
  background:rgba(17,27,46,.98);border:1px solid var(--line);border-radius:16px;
  box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;
}
.fb-head{
  display:flex;justify-content:space-between;align-items:center;gap:10px;
  padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.08);
}
.fb-title{font-weight:900}
.fb-close{
  width:auto;padding:6px 10px;border-radius:10px;border:1px solid var(--line);
  background:rgba(22,37,69,.65);color:var(--text);cursor:pointer;font-weight:900;
}
.fb-iframe{width:100%;height:100%;border:0;background:#fff}

/* =========================
   ✅ GA4 전송 확인 UI (추가)
   ========================= */
#gaBadge{
  width:auto;
  height:32px;
  padding:6px 10px;
  border-radius:10px;
  border:1px solid var(--line);
  background:rgba(22,37,69,.65);
  color:var(--text);
  cursor:pointer;
  font-weight:900;
  white-space:nowrap;
  display:inline-flex;
  align-items:center;
  gap:8px;
}
#gaDot{
  width:10px;height:10px;border-radius:99px;
  background:#9fb0d0;
  box-shadow:0 0 0 2px rgba(159,176,208,.15);
}
.ga-ok #gaDot{background:var(--green); box-shadow:0 0 0 2px rgba(25,195,125,.18)}
.ga-bad #gaDot{background:var(--red);   box-shadow:0 0 0 2px rgba(255,77,79,.18)}

#gaPanel{
  position:fixed;
  top:72px;
  right:18px;
  width:min(420px, 92vw);
  max-height:62vh;
  overflow:auto;
  background:rgba(17,27,46,.98);
  border:1px solid var(--line);
  border-radius:14px;
  box-shadow:var(--shadow);
  z-index:13000;
  display:none;
}
.gaPanelHead{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.gaPanelTitle{font-weight:900}
.gaPanelClose{
  width:auto;
  padding:6px 10px;
  border-radius:10px;
  border:1px solid var(--line);
  background:rgba(22,37,69,.65);
  color:var(--text);
  cursor:pointer;
  font-weight:900;
}
.gaPanelBody{padding:10px 12px}
.gaLine{font-size:12px;line-height:1.45;color:var(--muted);white-space:pre-wrap}
.gaLine strong{color:var(--text)}
.gaHint{
  margin-top:10px;
  padding:10px;
  border-radius:12px;
  border:1px dashed rgba(255,255,255,.14);
  color:var(--muted);
  font-size:12px;
  line-height:1.45;
}
.gaBtnRow{display:flex;gap:6px;margin-top:10px}
.gaBtnRow button{
  width:auto;
  padding:8px 10px;
  border-radius:10px;
  border:1px solid var(--line);
  background:rgba(22,37,69,.65);
  color:var(--text);
  font-weight:900;
}
</style>

<!-- =========================
     ✅ GA4 스니펫 (추가)
     - 아래 측정 ID만 교체
     ========================= -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-YR8SYEVY0J"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-YR8SYEVY0J', {
    // 디버깅용(전송 자체는 동일)
    send_page_view: true
  });
</script>
</head>

<body>

<header>
  <div class="header-inner">

    <div class="header-left">
      <div class="brand">
        <h1>승강기 검사기준 시뮬레이터</h1>
        <div class="sub">건축허가일 기반 검사기준 자동 판별</div>
      </div>

      <div class="tab-buttons" aria-label="화면 전환 탭">
        <button class="tab-btn active" type="button" data-tab="criteria">검사기준</button>
        <button class="tab-btn" type="button" data-tab="standard">표준화자료</button>
      </div>
    </div>

    <!-- ✅ 우측 상단 버튼 영역 -->
    <div class="font-controls">
      <!-- ✅ GA 상태 배지(추가) -->
      <button id="gaBadge" type="button" title="GA4 전송 상태 보기">
        <span id="gaDot"></span>
        <span id="gaText">GA 확인중…</span>
      </button>

      <button id="feedbackBtn" type="button" title="익명 피드백 남기기">피드백</button>
      <button id="increase-font" type="button">A+</button>
      <button id="decrease-font" type="button">A−</button>
    </div>

  </div>
</header>

<div class="wrap">

  <!-- 탭 1) 검사기준 -->
  <section id="criteria" class="tab-content active">

    <div class="panel">
      <div class="controls">

        <!-- 검사항목 -->
        <div>
          <div style="display:flex; gap:6px; align-items:center;">
            <input id="search" placeholder="검사항목 or 기준내용 검색">
            <button id="voiceBtn" type="button" aria-label="음성으로 검색" title="음성으로 검색">🎤</button>
          </div>
          <div id="voiceStatus" style="font-size:12px; margin-top:6px; opacity:0.75;"></div>

          <div style="display:flex;gap:6px;margin:6px 0">
            <button id="run" type="button">검색</button>
            <button id="reset" type="button">초기화</button>
          </div>

          <label>검사항목 선택</label>
          <div class="topics" id="topics"></div>
        </div>

        <!-- 건축허가일 -->
        <div>
          <label>건축허가일</label>
          <div class="preset-row" style="display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap">
            <button class="preset" type="button" data-d="2013-09-15">2013.09.15 이후</button>
            <button class="preset" type="button" data-d="2015-05-13">2015.05.13 이후</button>
            <button class="preset" type="button" data-d="2017-01-28">2017.01.28 이후</button>
            <button class="preset" type="button" data-d="2019-03-28">2019.03.28 이후</button>
          </div>
          <input type="date" id="date">
          <div class="help-text">※ 건축허가일 날짜를 입력하세요</div>
        </div>

      </div>
    </div>

    <div class="grid" id="results"></div>
    <footer style="margin-top:10px">🟩 적용 / 🟥 미적용</footer>

  </section>

  <!-- 탭 2) 표준화자료 -->
  <section id="standard" class="tab-content">
    <div class="standard-wrap">

      <div class="std-panel">
        <div class="std-toolbar">
          <input id="stdSearch" placeholder="표준화자료 검색 (제목/키워드/내용)" />
          <button id="stdClear" type="button">지우기</button>
        </div>

        <div class="std-chapters" id="stdChapters"></div>

        <div class="std-count" id="stdCount"></div>
      </div>

      <div class="std-list" id="stdList"></div>

    </div>
  </section>

</div>

<!-- 이미지 확대 모달 -->
<div id="imageModal" class="image-modal" onclick="closeImageModal()">
  <img id="modalImage" alt="">
</div>

<!-- 검색 돌아가기(맨위로) 버튼 -->
<button id="backToTopBtn" type="button">🔍 검색 돌아가기</button>

<!-- ✅ 피드백 모달 -->
<div id="fbModal" class="fb-modal" aria-hidden="true">
  <div class="fb-box" role="dialog" aria-modal="true" aria-label="피드백 작성">
    <div class="fb-head">
      <div class="fb-title">익명 피드백</div>
      <button id="fbClose" class="fb-close" type="button">닫기 ✕</button>
    </div>

    <iframe
      id="fbFrame"
      class="fb-iframe"
      title="피드백 폼"
      loading="lazy"
      referrerpolicy="no-referrer"
      src="">
    </iframe>
  </div>
</div>

<!-- ✅ GA 패널(추가) -->
<div id="gaPanel" aria-hidden="true">
  <div class="gaPanelHead">
    <div class="gaPanelTitle">GA4 전송 확인</div>
    <button id="gaClose" class="gaPanelClose" type="button">닫기 ✕</button>
  </div>
  <div class="gaPanelBody">
    <div class="gaLine"><strong>현재 페이지:</strong> <span id="gaLoc"></span></div>
    <div class="gaLine"><strong>측정 ID:</strong> <span id="gaIdTxt"></span></div>
    <div class="gaLine"><strong>상태:</strong> <span id="gaStatus"></span></div>
    <div class="gaLine" style="margin-top:8px"><strong>최근 전송 로그(최대 20개)</strong></div>
    <div id="gaLogs" class="gaLine" style="margin-top:6px"></div>

    <div class="gaBtnRow">
      <button id="gaSendPing" type="button">테스트 전송</button>
      <button id="gaClearLogs" type="button">로그 지우기</button>
    </div>

    <div class="gaHint">
      - <strong>전송 성공</strong>: 보통 Network에 <strong>g/collect</strong> 요청이 보이고 상태가 200/204로 나옵니다.<br>
      - <strong>차단</strong>: 광고차단/기관망 정책이면 요청이 안 나가거나 <strong>ERR_BLOCKED_BY_CLIENT</strong>가 뜹니다.<br>
      - 실시간 사용자 수는 "나 혼자 반복 접속"이면 1로 유지되는 게 정상일 수 있습니다.
    </div>
  </div>
</div>

<script>
/* =========================
   ✅ GA4 전송 상태 확인(추가)
   - 콘솔 없이 화면에서 확인 가능
   ========================= */
(() => {
  const MEASUREMENT_ID = "G-YR8SYEVY0J"; // ✅ 너 측정 ID로 교체(스니펫과 동일하게)

  const badge = document.getElementById('gaBadge');
  const dot = document.getElementById('gaDot');
  const text = document.getElementById('gaText');

  const panel = document.getElementById('gaPanel');
  const closeBtn = document.getElementById('gaClose');
  const locEl = document.getElementById('gaLoc');
  const idEl = document.getElementById('gaIdTxt');
  const statusEl = document.getElementById('gaStatus');
  const logsEl = document.getElementById('gaLogs');
  const sendPingBtn = document.getElementById('gaSendPing');
  const clearBtn = document.getElementById('gaClearLogs');

  const maxLogs = 20;
  const logs = [];

  function fmtTime(d){
    const hh = String(d.getHours()).padStart(2,'0');
    const mm = String(d.getMinutes()).padStart(2,'0');
    const ss = String(d.getSeconds()).padStart(2,'0');
    return `${hh}:${mm}:${ss}`;
  }
  function pushLog(msg){
    logs.unshift(`[${fmtTime(new Date())}] ${msg}`);
    if (logs.length > maxLogs) logs.pop();
    logsEl.textContent = logs.join("\n");
  }
  function setBadge(state, msg){
    badge.classList.remove('ga-ok','ga-bad');
    if(state === 'ok') badge.classList.add('ga-ok');
    if(state === 'bad') badge.classList.add('ga-bad');
    text.textContent = msg;
    statusEl.textContent = msg;
  }

  // 패널 기본 값
  locEl.textContent = location.href;
  idEl.textContent = MEASUREMENT_ID;

  // gtag 존재 여부
  const hasGtag = (typeof window.gtag === "function");
  if (!hasGtag) {
    setBadge('bad', "GA 스크립트 미로딩/차단");
    pushLog("gtag() 없음: 스니펫 누락 또는 차단 가능");
  } else {
    setBadge('ok', "GA 로딩됨(전송 확인 필요)");
    pushLog("gtag() 감지됨: 스크립트 로딩 OK");
  }

  // Network로 실제 전송(collect) 발생 여부를 '간접' 확인: fetch-beacon 실패 감지
  // (브라우저에서 beacon 실패 콜백은 제한적이라, 테스트 이벤트를 보내고 GA 실시간에서 같이 확인 권장)
  function sendTestPing(){
    if (typeof window.gtag !== "function") {
      setBadge('bad', "gtag 없음(전송 불가)");
      pushLog("테스트 전송 실패: gtag() 없음");
      return;
    }
    const eid = "debug_ping_" + Math.random().toString(16).slice(2);
    window.gtag('event', 'debug_ping', {
      event_id: eid,
      page_location: location.href
    });
    pushLog(`테스트 전송 호출: debug_ping (event_id=${eid})`);
    setBadge('ok', "테스트 전송 호출됨");
  }

  // 배지 클릭 => 패널 토글
  function openPanel(){
    panel.style.display = 'block';
    panel.setAttribute('aria-hidden','false');
  }
  function closePanel(){
    panel.style.display = 'none';
    panel.setAttribute('aria-hidden','true');
  }
  badge.addEventListener('click', () => {
    const opened = panel.style.display === 'block';
    opened ? closePanel() : openPanel();
  });
  closeBtn.addEventListener('click', closePanel);

  sendPingBtn.addEventListener('click', sendTestPing);
  clearBtn.addEventListener('click', () => {
    logs.length = 0;
    logsEl.textContent = "";
  });

  // 자동으로 1회 테스트 전송(원치 않으면 이 줄 주석 처리)
  setTimeout(sendTestPing, 800);

})();
</script>

<script>
let DATA=[], TITLE_MAP={}, currentFontSize=14;

const topicsEl=document.getElementById('topics');
const resultsEl=document.getElementById('results');
const dateEl=document.getElementById('date');
const search=document.getElementById('search');

const fontTargets='body, input, button, .topic span, .title, .text, .badge, .range, .std-title, .std-content, .std-chk span, .std-tag';

/* ✅ 탭 전환 */
const tabButtons = document.querySelectorAll(".tab-btn");

    if (target !== "criteria") backToTopBtn.style.display = "none";

    if (target === "standard") {
      initStandardTab();
    }
  });
});

function applyFont(){
  document.querySelectorAll(fontTargets).forEach(e=>{
    e.style.fontSize=currentFontSize+'px';
  });
}

/* 띄어쓰기 무시 검색용 정규화 */
function norm(s){
  return (s||'').toLowerCase().replace(/\s+/g,'');
}

/* =========================
   ✅ 검색 개선(추가): 결과 '축소' + '랭킹'
   - 1차: 연속 2글자(바이그램) 포함 여부로 필터링하여 결과를 줄임
   - 2차: (한글자 포함 + 바이그램 보너스) 점수로 정렬하여 상단에 노출
   - 키워드 사전 없이 동작
   ========================= */
function passFilter(hayRaw, qRaw){
  const hay = norm(hayRaw);
  const q = norm(qRaw);
  if(!q) return true;

  // 2글자 이상이면, 연속 2글자 중 하나라도 포함되면 통과(결과 축소 핵심)
  if(q.length >= 2){
    for(let i=0;i<q.length-1;i++){
      const bi = q.slice(i,i+2);
      if(hay.includes(bi)) return true;
    }
    return false;
  }
  // 1글자 검색은 너무 많이 걸릴 수 있어 그대로 통과(정렬에서 점수로 상위만 보여줌)
  return true;
}

function scoreMatch(hayRaw, qRaw){
  const hay = norm(hayRaw);
  const q = norm(qRaw);
  if(!q) return 0;

  // 한 글자 포함(중복 제거)
  const chars = new Set([...q]);
  let charHit = 0;
  chars.forEach(ch => { if(hay.includes(ch)) charHit++; });

  // 연속 2글자 포함 보너스
  let biHit = 0;
  if(q.length >= 2){
    for(let i=0;i<q.length-1;i++){
      const bi = q.slice(i,i+2);
      if(hay.includes(bi)) biHit++;
    }
  }

  return (charHit * 1) + (biHit * 3);
}

function getRankedMatches(query, selectedTitles){
  const qRaw = query || "";
  const q = norm(qRaw);
  if(!q) return [];

  // 1차 필터
  let pool = [];
  for(let idx=0; idx<DATA.length; idx++){
    const i = DATA[idx];
    const hayAll = (i.title||"") + " " + (i.label||"") + " " + (i.text||"");
    if(passFilter(hayAll, qRaw)) pool.push({i, idx});
  }

  // 너무 빡세서 0건이면(또는 극히 적으면) → 완화: 전체에서 점수로만 랭킹
  if(pool.length === 0){
    for(let idx=0; idx<DATA.length; idx++){
      pool.push({i: DATA[idx], idx});
    }
  }

  // 2차 랭킹(정렬)
  const ranked = pool.map(({i, idx})=>{
    const total =
      scoreMatch(i.title, qRaw) * 2 +  // title 가중치
      scoreMatch(i.text,  qRaw) * 1 +
      scoreMatch(i.label, qRaw) * 1;

    return {i, idx, total};
  }).filter(x => x.total > 0);

  ranked.sort((a,b)=>{
    const ap = selectedTitles.has(a.i.title) ? 0 : 1;
    const bp = selectedTitles.has(b.i.title) ? 0 : 1;
    if(ap !== bp) return ap - bp;
    if(b.total !== a.total) return b.total - a.total;
    return a.idx - b.idx;
  });

  // 상위 N개만 표시(너무 많아지는 것 방지)
  return ranked.slice(0, 120);
}

fetch('./data/criteria.json')
.then(r=>r.json())
.then(j=>{
  DATA=j.criteria||[];
  DATA.forEach(i=>{
    if(!TITLE_MAP[i.title]) TITLE_MAP[i.title]=[];
    TITLE_MAP[i.title].push(i);
  });
  renderTopics();
  renderResults();
})
.catch(()=>{
  resultsEl.innerHTML = `
    <div class="card">
      <div class="title">데이터를 불러오지 못했습니다.</div>
      <div class="row"><div class="text">./data/criteria.json 경로와 파일명을 확인하세요.</div></div>
    </div>
  `;
});

function renderTopics(){
  if(!topicsEl) return;
  topicsEl.innerHTML='';
  const qRaw = search.value || "";
  const q = norm(qRaw);

  const titles = Object.keys(TITLE_MAP);

  // 검색어가 있으면: 제목을 필터+랭킹하여 상단에 관련 항목만 노출(선택하기 쉽게)
  let show = titles;
  if(q){
    show = titles
      .map(t => {
        const s = scoreMatch(t, qRaw);
        const p = passFilter(t, qRaw);
        return { t, s, p };
      })
      .filter(x => x.p || x.s > 0)
      .sort((a,b)=> (b.s - a.s) || a.t.localeCompare(b.t, 'ko'))
      .slice(0, 200)
      .map(x => x.t);
  }

  show.forEach(t=>{
    const l=document.createElement('label');
    l.className='topic';
    const c=document.createElement('input');
    c.type='checkbox'; c.value=t;
    c.onchange=renderResults;
    const s=document.createElement('span');
    s.innerHTML=highlight(t,search.value);
    l.append(c,s);
    topicsEl.appendChild(l);
  });
}

function renderImage(imagePath){
  if(!imagePath) return '';
  return `
    <div style="margin-top:10px">
      <img src="${imagePath}"
           style="width:100%; max-width:400px; cursor:zoom-in; border:1px solid #22314f; border-radius:8px;"
           onclick="openImageModal('${imagePath}')" alt="">
      <div style="margin-top:4px;font-size:12px;color:#9fb0d0;text-align:center">
        ※ 이미지를 크게 보려면 클릭하시오.
      </div>
    </div>
  `;
}

function openImageModal(src){
  document.getElementById('modalImage').src=src;
  document.getElementById('imageModal').style.display='flex';
}
function closeImageModal(){
  document.getElementById('imageModal').style.display='none';
}

function isApplied(d,f,t){
  if(!d) return false;
  const b=new Date(d);
  if(f && b<new Date(f)) return false;
  if(t && b>new Date(t)) return false;
  return true;
}

function escapeRegExp(s){
  return (s||'').replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}
function highlight(t,k){
  if(!k) return t;
  const safe = escapeRegExp(k);
  return t.replace(new RegExp(`(${safe})`,'gi'),'<mark>$1</mark>');
}

function getSelectedTitles(){
  const set=new Set();
  document.querySelectorAll('#topics input:checked').forEach(cb=>set.add(cb.value));
  return set;
}

function renderResults(){
  if(!resultsEl) return;
  resultsEl.innerHTML='';
  const selectedTitles = getSelectedTitles();

  const keywordRaw = search.value || "";
  const keyword = norm(keywordRaw);

  let matches = [];

  // ✅ 검색어가 있으면: (필터로 결과 축소) + (점수로 랭킹)
  if (keyword) {
    matches = getRankedMatches(keywordRaw, selectedTitles).map(x => ({ i: x.i }));
  } else {
    // ✅ 검색어가 없으면: 기존처럼 '선택된 검사항목'만 표시
    document.querySelectorAll('#topics input:checked').forEach(cb=>{
      (TITLE_MAP[cb.value]||[]).forEach(i=>matches.push({i}));
    });
  }

  // 표시할 것이 없을 때 안내
  if(!matches.length){
    resultsEl.innerHTML = `
      <div class="card">
        <div class="title">검색 결과가 없습니다.</div>
        <div class="row"><div class="text">검색어를 더 구체적으로 입력하거나, 검사항목을 선택해보세요.</div></div>
      </div>
    `;
    return;
  }

  matches.forEach(({i})=>{
    const isSelected = selectedTitles.has(i.title);
    const titleHtml = isSelected
      ? `<span class="selected-title">${highlight(i.title,search.value)}</span>`
      : `${highlight(i.title,search.value)}`;

    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`
      <div class="card-header">
        <div class="title">${titleHtml}</div>
        <div class="badge ${isApplied(dateEl.value,i.from,i.to)?'ok':'no'}">
          ${isApplied(dateEl.value,i.from,i.to)?'🟩 적용':'🟥 미적용'}
          <div class="range">${i.from||'—'} ~ ${i.to||'현재'}</div>
        </div>
      </div>

      <div class="row">
        <div class="text">
          ${highlight(i.text,search.value)}
        </div>
      </div>

      ${renderImage(i.image)}
    `;
    resultsEl.appendChild(card);
  });
}

/* 이벤트 */
document.getElementById('increase-font').onclick=()=>{currentFontSize++;applyFont()};
document.getElementById('decrease-font').onclick=()=>{currentFontSize=Math.max(10,currentFontSize-1);applyFont()};
document.getElementById('run').onclick=renderResults;
document.getElementById('reset').onclick=()=>{

  document.querySelectorAll('#topics input').forEach(c=>c.checked=false);

search.oninput=()=>{ renderTopics(); renderResults(); };

document.querySelectorAll('.preset').forEach(b=>{

/* 검색 돌아가기(맨위로) 버튼 */
const backToTopBtn = document.getElementById('backToTopBtn');
window.addEventListener('scroll', ()=>{

    backToTopBtn.style.display = 'none';

backToTopBtn.addEventListener('click', ()=>{

/* 음성인식(검색용) */
(() => {
  const voiceBtn = document.getElementById('voiceBtn');
  const voiceStatus = document.getElementById('voiceStatus');

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    voiceBtn.disabled = true;
    voiceStatus.textContent = "음성인식 미지원 브라우저입니다. (PC 크롬 권장)";
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "ko-KR";
  recognition.interimResults = true;
  recognition.continuous = false;

  let listening = false;
  const setStatus = (msg) => { voiceStatus.textContent = msg || ""; };

  voiceBtn.addEventListener('click', () => {
    if (listening) { recognition.stop(); return; }
    try {
      listening = true;
      voiceBtn.classList.add('listening');
      setStatus("🎙️ 듣는 중… 말씀하세요");
      recognition.start();
    } catch (e) {
      listening = false;
      voiceBtn.classList.remove('listening');
      setStatus("음성인식 시작 실패. 다시 눌러주세요.");
    }
  });

  recognition.onresult = (event) => {
    let interim = "";
    let finalText = "";
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) finalText += t;
      else interim += t;
    }
    const text = (finalText || interim || "").trim();
    search.value = text;
    search.dispatchEvent(new Event("input", { bubbles: true }));
    if (finalText) setStatus(`인식됨: ${finalText.trim()}`);
  };

  recognition.onerror = (event) => { setStatus(`음성인식 오류: ${event.error}`); };

  recognition.onend = () => {
    listening = false;
    voiceBtn.classList.remove('listening');
  };
})();

  { no: 11, title: "주행안내 레일" },
  { no: 12, title: "완충기" },

];

/* 샘플 데이터 */
let STD_DATA = [
  {
    id: "STD-05-001",
    chapter: 5,
    title: "표준화자료 예시(5장)",
    keywords: ["일반사항", "표준화", "예시"],
    content: "여기에 표준화자료 내용이 들어갑니다.\n(검색: 제목/키워드/내용, 띄어쓰기 무시)"
  },
  {
    id: "STD-06-001",
    chapter: 6,
    title: "표준화자료 예시(6장)",
    keywords: ["승강로", "기계실", "풀리실"],
    content: "6장 예시 내용입니다.\n'기계실' 같은 키워드로 검색 테스트 가능"
  },
  {
    id: "STD-14-001",
    chapter: 14,
    title: "표준화자료 예시(14장)",
    keywords: ["전기설비", "전기기기", "점검"],
    content: "14장 예시 내용입니다.\n전기 관련 키워드 검색 테스트"
  }
];

let stdInitialized = false;

function stdEscapeHtml(str){
  return (str ?? "").toString()
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function renderStdChapters(){
  const wrap = document.getElementById("stdChapters");
  if(!wrap) return;

  wrap.innerHTML = `
    <div class="std-chapters-head">
      <span>목차(Chapter) 선택</span>
      <div class="std-chapters-actions">
        <button id="stdAll" type="button">전체</button>
        <button id="stdNone" type="button">해제</button>
      </div>
    </div>
    <div class="std-chapters-grid">
      ${STD_CHAPTERS.map(c=>`
        <label class="std-chk">
          <input class="stdChapter" type="checkbox" value="${c.no}" checked>
          <span>${c.no}. ${stdEscapeHtml(c.title)}</span>
        </label>
      `).join("")}
    </div>
  `;
}

function getStdCheckedChapters(){
  return [...document.querySelectorAll(".stdChapter:checked")].map(el=>Number(el.value));
}

function filterStd(){
  const q = norm((document.getElementById("stdSearch")||{}).value || "");
  const chapters = new Set(getStdCheckedChapters());

  return STD_DATA.filter(item=>{
    if(!chapters.has(item.chapter)) return false;
    if(!q) return true;

    const inTitle = norm(item.title).includes(q);
    const inKeywords = (item.keywords||[]).some(k=>norm(k).includes(q));
    const inContent = norm(item.content).includes(q);

    return inTitle || inKeywords || inContent;
  });
}

function renderStdList(){
  const listEl = document.getElementById("stdList");
  const countEl = document.getElementById("stdCount");
  if(!listEl) return;

  const list = filterStd();
  if(countEl) countEl.textContent = `검색 결과: ${list.length}건`;

  if(!list.length){
    listEl.innerHTML = `<div class="std-empty">검색 결과가 없습니다.</div>`;
    return;
  }

  listEl.innerHTML = list.map(item=>`
    <div class="std-item">
      <div class="std-item-top">
        <h3 class="std-title">${stdEscapeHtml(item.title)}</h3>
        <div class="std-badge">${item.chapter}장</div>
      </div>
      <div class="std-tags">
        ${(item.keywords||[]).map(k=>`<span class="std-tag">${stdEscapeHtml(k)}</span>`).join("")}
      </div>
      <div class="std-content">${stdEscapeHtml(item.content)}</div>
    </div>
  `).join("");
}

function bindStdEvents(){
  const stdSearch = document.getElementById("stdSearch");
  const stdClear = document.getElementById("stdClear");
  const stdChapters = document.getElementById("stdChapters");

  if(stdSearch){
    stdSearch.addEventListener("input", renderStdList);
  }
  if(stdClear){
    stdClear.addEventListener("click", ()=>{
      if(stdSearch) stdSearch.value = "";
      renderStdList();
    });
  }
  if(stdChapters){
    stdChapters.addEventListener("change", (e)=>{
      if(e.target && e.target.classList && e.target.classList.contains("stdChapter")){
        renderStdList();
      }
    });

    stdChapters.addEventListener("click", (e)=>{
      if(!e.target) return;
      if(e.target.id === "stdAll"){
        document.querySelectorAll(".stdChapter").forEach(cb=>cb.checked = true);
        renderStdList();
      }
      if(e.target.id === "stdNone"){
        document.querySelectorAll(".stdChapter").forEach(cb=>cb.checked = false);
        renderStdList();
      }
    });
  }
}

function initStandardTab(){
  if(stdInitialized) return;
  stdInitialized = true;
  renderStdChapters();
  bindStdEvents();
  renderStdList();
}

initStandardTab();

/* =========================
   ✅ 피드백: Google Form 모달
   ========================= */
(() => {
  const FB_FORM_URL = "https://naver.me/5xgAWwSb";

  const btn = document.getElementById('feedbackBtn');
  const modal = document.getElementById('fbModal');
  const closeBtn = document.getElementById('fbClose');
  const frame = document.getElementById('fbFrame');

  if(!btn || !modal || !closeBtn || !frame) return;

  frame.src = FB_FORM_URL;

  const open = () => {
    modal.style.display = 'flex';
    modal.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  };

  const close = () => {
    modal.style.display = 'none';
    modal.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
  };

  btn.addEventListener('click', open);
  closeBtn.addEventListener('click', close);

  modal.addEventListener('click', (e) => { if(e.target === modal) close(); });

  window.addEventListener('keydown', (e) => {
    if(e.key === 'Escape' && modal.style.display === 'flex') close();
  });
})();
</script>
