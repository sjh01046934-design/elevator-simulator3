<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI TL - 안전기준 적용 판단 프로그램</title>
<style>
/* CSS 최적화 (공백/줄바꿈 압축) */
:root{--bg:#0b1220;--bg-grad-1:#14234a;--bg-grad-2:#0b1220;--card:#111b2e;--card-soft:rgba(17,27,46,.72);--panel-top:rgba(255,255,255,.04);--panel-bottom:rgba(255,255,255,.02);--muted:#9fb0d0;--text:#e7eefc;--green:#19c37d;--red:#ff4d4f;--line:#22314f;--shadow:0 10px 30px rgba(0,0,0,.35);--input-bg:rgba(10,16,30,.55);--button-bg:rgba(22,37,69,.85);--button-bg-soft:rgba(22,37,69,.65);--button-hover:rgba(35,60,105,.95);--header-bg-1:rgba(11,18,32,.98);--header-bg-2:rgba(11,18,32,.92);--tab-bg:rgba(22,37,69,.55);--tab-active-bg:rgba(25,195,125,.95);--tab-active-text:#00120a;--topic-border:rgba(255,255,255,.08);--keyword-border:rgba(255,255,255,.08);--keyword-bg:rgba(10,16,30,.25);--keyword-hover:rgba(255,255,255,.04);--title-list-border:rgba(255,255,255,.06);--title-list-bg:rgba(255,255,255,.02);--title-btn-bg:rgba(255,255,255,.02);--title-btn-hover:rgba(255,255,255,.06);--title-btn-active:rgba(25,195,125,.14);--title-btn-active-border:rgba(25,195,125,.65);--modal-bg:rgba(0,0,0,.85);--fb-overlay:rgba(0,0,0,.72);--fb-box-bg:rgba(17,27,46,.98);--selected-bg:#b6ff5c;--selected-text:#000;--img-caption:#9fb0d0;--img-border:#22314f;--mark-bg:yellow;--mark-text:black;--chip-bg:rgba(255,255,255,.05);--chip-border:rgba(255,255,255,.08);--chip-hover:rgba(255,255,255,.10);--fav:#ffd54a;}
body.light-mode{--bg:#f5f7fb;--bg-grad-1:#ffffff;--bg-grad-2:#eef3fb;--card:#ffffff;--card-soft:#ffffff;--panel-top:rgba(255,255,255,.96);--panel-bottom:rgba(245,248,252,.96);--muted:#5f6f86;--text:#1a2433;--green:#0f9f61;--red:#d83a3a;--line:#d8e0ec;--shadow:0 8px 24px rgba(17,24,39,.08);--input-bg:#ffffff;--button-bg:#edf2fa;--button-bg-soft:#f4f7fb;--button-hover:#dfe8f5;--header-bg-1:rgba(255,255,255,.96);--header-bg-2:rgba(248,250,253,.92);--tab-bg:#f1f5fb;--tab-active-bg:#19c37d;--tab-active-text:#ffffff;--topic-border:rgba(26,36,51,.08);--keyword-border:rgba(26,36,51,.08);--keyword-bg:#f8fafc;--keyword-hover:#eef3f9;--title-list-border:rgba(26,36,51,.08);--title-list-bg:#fcfdff;--title-btn-bg:#ffffff;--title-btn-hover:#f3f7fc;--title-btn-active:rgba(25,195,125,.10);--title-btn-active-border:rgba(25,195,125,.45);--modal-bg:rgba(20,28,40,.72);--fb-overlay:rgba(20,28,40,.48);--fb-box-bg:#ffffff;--selected-bg:#d8ff85;--selected-text:#111;--img-caption:#5f6f86;--img-border:#d8e0ec;--mark-bg:#fff29a;--mark-text:#111;--chip-bg:#f7f9fc;--chip-border:#dde6f1;--chip-hover:#eef4fb;--fav:#e0a800;}
*{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans KR",Arial;background:radial-gradient(1200px 600px at 20% 0%,var(--bg-grad-1) 0%,var(--bg-grad-2) 60%);color:var(--text);font-size:14px;transition:background .25s,color .25s;}
.wrap{max-width:1200px;margin:0 auto;padding:22px 16px 140px}
header{position:sticky;top:0;z-index:5;background:linear-gradient(180deg, var(--header-bg-1), var(--header-bg-2));border-bottom:1px solid var(--line);backdrop-filter:blur(6px);}
.header-inner{max-width:1200px;margin:0 auto;padding:10px 16px 12px;display:flex;justify-content:space-between;align-items:center;gap:12px;}
h1{margin:0;font-size:18px} .sub{font-size:12px;color:var(--muted)}
.font-controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.font-controls button, #themeToggle, .tab-btn{padding:8px 12px;border-radius:10px;border:1px solid var(--line);background:var(--button-bg);color:var(--text);font-weight:900;cursor:pointer;white-space:nowrap;}
.font-controls button{width:32px;height:32px;font-size:12px;padding:0;} #themeToggle, .tab-btn{width:auto;}
.header-left{display:flex;align-items:center;gap:12px;min-width:0;} .tab-buttons{display:inline-flex;gap:6px;align-items:center;}
.tab-btn{background:var(--tab-bg);} .tab-btn.active{background:var(--tab-active-bg);color:var(--tab-active-text);border-color:var(--tab-active-bg);}
@media(max-width:900px){.header-inner{flex-direction:column;align-items:stretch} .header-left{flex-direction:column;align-items:flex-start;gap:8px;} h1,.sub{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;} h1{font-size:16px;} .sub{font-size:11px;} .tab-buttons{width:100%;gap:6px} .tab-btn{padding:8px 10px;font-size:12px;flex:1;} .font-controls{justify-content:flex-end}}
.tab-content{display:none} .tab-content.active{display:block}
.panel, .std-panel{background:linear-gradient(180deg, var(--panel-top), var(--panel-bottom));border:1px solid var(--line);border-radius:14px;padding:12px;box-shadow:var(--shadow);margin-top:10px;}
.controls{display:grid;grid-template-columns:2fr 1fr;gap:10px;} @media(max-width:900px){.controls{display:flex;flex-direction:column} .controls>div:last-child{order:-1}}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
input,button{width:100%;padding:10px 12px;border-radius:12px;border:1px solid var(--line);background:var(--input-bg);color:var(--text);}
button{cursor:pointer;font-weight:700;background:var(--button-bg)}
.topics{border:1px solid var(--line);border-radius:12px;padding:8px;max-height:220px;overflow-y:auto;background:var(--card);}
.topic{display:flex;gap:8px;align-items:flex-start;padding:6px 4px;border-bottom:1px dashed var(--topic-border)} .topic:last-child{border-bottom:none} .topic input{width:auto;margin-top:2px} .topic span{font-size:13px}
.grid{display:grid;gap:12px;margin-top:14px}
.card, .std-item{background:var(--card-soft);border:1px solid var(--line);border-radius:14px;padding:12px;box-shadow:var(--shadow);}
.card-header, .std-item-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.title{font-weight:800} .badge{font-size:12px;font-weight:800;text-align:right} .ok{color:var(--green)} .no{color:var(--red)} .range{font-size:12px;color:var(--muted)}
.row{margin-top:6px} .text{white-space:pre-line;line-height:1.5;font-size:13px;margin:0;padding:0} mark{background:var(--mark-bg);color:var(--mark-text)}
.help-text{margin-top:4px;font-size:12px;color:var(--muted)}
.selected-title{display:inline-block;background:var(--selected-bg);color:var(--selected-text);padding:2px 6px;border-radius:6px;line-height:1.3;}
.toggle-btn{width:auto;min-width:112px;padding:10px 14px;border-radius:12px;border:1px solid var(--line);background:var(--button-bg);color:var(--text);font-weight:900;} .toggle-btn.active{background:var(--tab-active-bg);color:var(--tab-active-text);border-color:var(--tab-active-bg);}
.image-modal{position:fixed;inset:0;background:var(--modal-bg);display:none;align-items:center;justify-content:center;z-index:9999;cursor:zoom-out;} .image-modal img{max-width:95%;max-height:95%;border-radius:8px;box-shadow:0 0 30px rgba(0,0,0,0.6);}
#backToTopBtn{position:fixed;right:18px;bottom:18px;width:auto;padding:12px 14px;border-radius:14px;border:1px solid var(--line);background:var(--button-bg);color:var(--text);font-weight:800;cursor:pointer;box-shadow:var(--shadow);display:none;z-index:999;user-select:none;} #backToTopBtn:hover{background:var(--button-hover)}
#aiFabBtn{position:fixed;right:18px;bottom:70px;width:auto;padding:14px 18px;border-radius:999px;border:none;background:linear-gradient(135deg, #19c37d, #0f9f61);color:#fff;font-weight:900;font-size:15px;cursor:pointer;box-shadow:0 8px 24px rgba(25,195,125,0.4);z-index:999;display:flex;align-items:center;gap:8px;transition:transform 0.2s;} #aiFabBtn:hover{transform:scale(1.05);}
#voiceBtn, #stdVoiceBtn{width:auto;padding:15px 20px;border-radius:12px;flex:0 0 auto;} #voiceBtn.listening, #stdVoiceBtn.listening{border-color:var(--green);box-shadow:0 0 0 2px rgba(25,195,125,.15);}
.utility-section{margin-top:10px;display:grid;gap:10px;} .utility-box{border:1px solid var(--line);border-radius:12px;background:var(--card);padding:10px;} .utility-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px;cursor:pointer;} .utility-title{font-size:12px;color:var(--muted);font-weight:800;} .utility-head button{width:auto;padding:6px 10px;font-size:12px;border-radius:10px;}
.chip-row{display:flex;flex-wrap:wrap;gap:6px} .chip{width:auto;padding:7px 10px;border-radius:999px;background:var(--chip-bg);border:1px solid var(--chip-border);color:var(--text);font-size:12px;font-weight:700;} .chip:hover{background:var(--chip-hover)} .chip.starred{border-color:rgba(255,213,74,.55)} .empty-chip{font-size:12px;color:var(--muted)}
.card-toolbar,.std-card-toolbar{display:flex;justify-content:flex-end;gap:6px;margin-top:10px;flex-wrap:wrap;} .text-preview,.std-preview{display:none;margin-top:8px;color:var(--muted);font-size:12px;line-height:1.45;}
.card.collapsed .row, .card.collapsed .card-image-wrap, .std-item.collapsed .std-content, .std-item.collapsed .std-apply, .std-item.collapsed .std-image-wrap{display:none;} .card.collapsed .text-preview, .std-item.collapsed .std-preview{display:block;}
.small-action-btn{width:auto;padding:7px 10px;border-radius:10px;border:1px solid var(--line);background:var(--button-bg-soft);color:var(--text);font-weight:800;} .small-action-btn.starred{border-color:rgba(255,213,74,.55);color:var(--fav);}
@media(max-width:900px){#search,#date,#stdSearch{font-size:16px;padding:14px;height:48px} #backToTopBtn{right:12px;bottom:12px;padding:11px 12px;border-radius:12px} #aiFabBtn{right:12px;bottom:64px;padding:12px 16px;font-size:14px;} #voiceBtn, #stdVoiceBtn{padding:14px 12px;height:48px} .action-row{flex-wrap:wrap;} .action-row .toggle-btn, .action-row #reset{flex:1 1 auto;width:auto;}}
.standard-wrap{margin-top:10px} .std-toolbar{display:flex;gap:8px;align-items:center;} #stdSearch{flex:1;} #stdClear{width:auto;} #stdVoiceStatus{margin-top:6px;font-size:12px;color:var(--muted);min-height:18px;}
.std-chapters{margin-top:10px;border:1px solid var(--line);border-radius:14px;padding:10px;background:var(--card-soft);max-height:290px;overflow-y:auto;} .std-chapters-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px;color:var(--muted);font-size:12px;} .std-chapters-grid{display:grid;grid-template-columns:1fr;gap:6px;} .std-keyword-block{border:1px solid var(--keyword-border);border-radius:10px;background:var(--keyword-bg);overflow:hidden;}
.std-keyword-btn{width:100%;display:flex;justify-content:space-between;align-items:center;gap:8px;padding:8px 10px;border:none;border-radius:0;background:transparent;color:var(--text);font-weight:800;font-size:12px;text-align:left;} .std-keyword-btn:hover{background:var(--keyword-hover);} .std-keyword-btn.active{background:rgba(25,195,125,.12);} .std-keyword-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;} .std-arrow{font-size:11px;color:var(--muted);flex:0 0 auto;}
.std-title-list{display:none;border-top:1px solid var(--title-list-border);background:var(--title-list-bg);padding:4px 6px 6px;} .std-title-list.open{display:grid;gap:4px} .std-title-btn{width:100%;text-align:left;padding:6px 8px;border-radius:8px;border:1px solid transparent;background:var(--title-btn-bg);color:var(--text);font-size:12px;font-weight:700;line-height:1.3;} .std-title-btn:hover{background:var(--title-btn-hover);} .std-title-btn.active{border-color:var(--title-btn-active-border);background:var(--title-btn-active);}
.std-count{margin-top:10px;font-size:12px;color:var(--muted)} .std-list{display:grid;gap:12px;margin-top:12px} .std-badge{font-size:11px;padding:4px 8px;border-radius:999px;border:1px solid var(--line);color:var(--muted);white-space:nowrap;} .std-title{margin:0;font-size:13px;font-weight:900;line-height:1.35;} .std-content{margin-top:10px;white-space:pre-line;line-height:1.5;opacity:.95;font-size:12.5px;} .std-empty{padding:18px;border:1px dashed var(--line);border-radius:14px;color:var(--muted);text-align:center;background:var(--card);} .std-apply{margin-top:8px;font-size:12px;color:var(--muted);}
#feedbackBtn, #gaBadge{width:auto;height:32px;padding:6px 10px;border-radius:10px;border:1px solid var(--line);background:var(--button-bg);color:var(--text);cursor:pointer;font-weight:900;white-space:nowrap;display:inline-flex;align-items:center;gap:8px;justify-content:center;} #feedbackBtn:hover{background:var(--button-hover)}
.fb-modal{position:fixed;inset:0;background:var(--fb-overlay);display:none;align-items:center;justify-content:center;z-index:12000;} .fb-box{width:min(820px, 92vw);height:min(720px, 88vh);background:var(--fb-box-bg);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;} .fb-head{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--title-list-border);} .fb-title{font-weight:900} .fb-close, .gaPanelClose{width:auto;padding:6px 10px;border-radius:10px;border:1px solid var(--line);background:var(--button-bg-soft);color:var(--text);cursor:pointer;font-weight:900;} .fb-iframe{width:100%;height:100%;border:0;background:#fff}
#gaDot{width:10px;height:10px;border-radius:99px;background:#9fb0d0;box-shadow:0 0 0 2px rgba(159,176,208,.15);} .ga-ok #gaDot{background:var(--green);box-shadow:0 0 0 2px rgba(25,195,125,.18)} .ga-bad #gaDot{background:var(--red);box-shadow:0 0 0 2px rgba(255,77,79,.18)}
#gaPanel{position:fixed;top:72px;right:18px;width:min(420px, 92vw);max-height:62vh;overflow:auto;background:var(--fb-box-bg);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);z-index:13000;display:none;} .gaPanelHead{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--title-list-border);} .gaPanelTitle{font-weight:900} .gaPanelBody{padding:10px 12px} .gaLine{font-size:12px;line-height:1.45;color:var(--muted);white-space:pre-wrap} .gaLine strong{color:var(--text)} .gaHint{margin-top:10px;padding:10px;border-radius:12px;border:1px dashed var(--line);color:var(--muted);font-size:12px;line-height:1.45;background:var(--card);} .gaBtnRow{display:flex;gap:6px;margin-top:10px} .gaBtnRow button{width:auto;padding:8px 10px;border-radius:10px;border:1px solid var(--line);background:var(--button-bg-soft);color:var(--text);font-weight:900;}
#gaBadge, #gaPanel, #gaSendPing{display:none !important;}

/* AI 비서 모달 CSS */
.ai-modal{position:fixed;inset:0;background:var(--fb-overlay);display:none;align-items:flex-end;justify-content:center;z-index:15000;}
.ai-box{width:100%;max-width:600px;background:var(--fb-box-bg);border-top-left-radius:24px;border-top-right-radius:24px;box-shadow:0 -10px 40px rgba(0,0,0,0.5);display:flex;flex-direction:column;padding:20px;animation:slideUp 0.3s ease-out;}
@keyframes slideUp{from{transform:translateY(100%);} to{transform:translateY(0);}}
.ai-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.ai-title{font-size:18px;font-weight:900;color:var(--green);display:flex;align-items:center;gap:6px;}
.ai-chat-area{background:var(--card);border-radius:16px;padding:16px;min-height:150px;max-height:40vh;overflow-y:auto;border:1px solid var(--line);margin-bottom:16px;display:flex;flex-direction:column;gap:12px;}
.ai-bubble{padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.5;max-width:90%;word-break:break-word;}
.ai-bubble.user{background:var(--button-bg);color:var(--text);align-self:flex-end;border-bottom-right-radius:4px;}
.ai-bubble.bot{background:var(--button-bg-soft);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;border:1px solid var(--line);}
.ai-bubble.error{background:rgba(255,77,79,0.1);color:var(--red);align-self:center;text-align:center;font-size:12px;}
.ai-controls{width:100%;display:flex;flex-direction:column;align-items:stretch;gap:8px;}
.ai-input-row{display:flex;width:100%;gap:8px;align-items:center;}
#aiTextInput{flex:1;padding:12px 16px;border-radius:24px;border:1px solid var(--line);background:var(--input-bg);color:var(--text);font-size:14px;}
#aiSendBtn, .ai-mic-btn{width:46px;height:46px;border-radius:50%;border:none;background:var(--button-bg);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
#aiSendBtn{background:var(--green);color:#fff;}
.ai-mic-btn.recording{background:var(--green);color:#fff;border-color:var(--green);box-shadow:0 0 0 6px rgba(25,195,125,0.2);animation:pulse 1.5s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(25,195,125,0.4);} 70%{box-shadow:0 0 0 10px rgba(25,195,125,0);} 100%{box-shadow:0 0 0 0 rgba(25,195,125,0);}}
.ai-status{font-size:13px;color:var(--muted);font-weight:700;text-align:center;line-height:1.4;}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-left">
      <div class="brand">
        <h1>AI TL</h1>
        <div class="sub">안전기준 적용 판단 프로그램</div>
      </div>
      <div class="tab-buttons" aria-label="화면 전환 탭">
        <button class="tab-btn active" type="button" data-tab="criteria">검사기준</button>
        <button class="tab-btn" type="button" data-tab="standard">표준화자료</button>
      </div>
    </div>
    <div class="font-controls">
      <button id="themeToggle" type="button" title="화면 모드 전환">☀️ 화이트모드</button>
      <button id="gaBadge" type="button" title="GA4 전송 상태 보기"><span id="gaDot"></span><span id="gaText">GA 확인중…</span></button>
      <button id="feedbackBtn" type="button" title="익명 피드백 남기기">피드백</button>
      <button id="increase-font" type="button">A+</button>
      <button id="decrease-font" type="button">A−</button>
    </div>
  </div>
</header>

<div class="wrap">
  <section id="criteria" class="tab-content active">
    <div class="panel">
      <div style="text-align:right; font-size:12px; color:var(--muted); margin-bottom:10px; font-weight: 700;">📅 최종 업데이트 날짜: 2026.04.07</div>
      <div class="controls">
        <div>
          <div style="display:flex; gap:6px; align-items:center;">
            <input id="search" placeholder="검사항목 or 기준내용 검색">
            <button id="voiceBtn" type="button" title="음성으로 검색">🎤</button>
          </div>
          <div id="voiceStatus" style="font-size:12px; margin-top:6px; opacity:0.75; color:var(--muted);"></div>

          <div class="action-row" style="display:flex;gap:6px;margin:6px 0">
            <button id="appliedOnlyBtn" class="toggle-btn" type="button">적용기준만 보기 OFF</button>
            <button id="criteriaCollapseAllBtn" class="toggle-btn" type="button">내용 접기 OFF</button>
            <button id="reset" type="button">초기화</button>
          </div>

          <div class="utility-section">
            <div class="utility-box">
               <div class="utility-head">
                <div class="utility-title">최근 검색어 <span class="toggle-icon" style="font-size:11px; margin-left:6px; font-weight:normal; color:var(--muted); text-decoration:underline;">펼치기</span></div>
                <button id="clearRecentSearchesBtn" type="button">지우기</button>
              </div>
              <div class="chip-row" id="recentSearches" style="display:none;"></div>
            </div>
            <div class="utility-box">
              <div class="utility-head">
                <div class="utility-title">즐겨찾기 기준 <span class="toggle-icon" style="font-size:11px; margin-left:6px; font-weight:normal; color:var(--muted); text-decoration:underline;">펼치기</span></div>
                <button id="clearFavoritesBtn" type="button">전체 해제</button>
              </div>
              <div class="chip-row" id="favoriteTitles" style="display:none;"></div>
            </div>
          </div>

          <label style="margin-top: 10px;">검사항목 선택</label>
          <div class="topics" id="topics"></div>
        </div>

        <div>
          <label>건축허가일</label>
          <input type="date" id="date">
          <div class="help-text" style="margin-top:6px;">※ 건축허가일 날짜를 입력하세요</div>
        </div>
      </div>
    </div>
    <div class="grid" id="results"></div>
    <footer style="margin-top:10px;color:var(--muted)">🟩 적용 / 🟥 미적용</footer>
  </section>

<script>
// ==========================================
// 💡 API 키 적용 완료
// ==========================================
const GEMINI_API_KEY = "AIzaSyBmlQTUsnZIznMnVlGC2r75ve4gQZtV4LA";
// ==========================================

// --- 공통 상태 및 초기화 ---
let DATA=[], TITLE_MAP={}, currentFontSize=14;
let appliedOnly=false, criteriaCollapseAll=false, stdCollapseAll=false;
let STD_DATA=[], STD_KEYWORD_MAP={}, stdInitialized=false, stdLoaded=false, stdOpenKeyword=null, stdSelectedTitle=null;

const STORAGE_KEYS = { recentCriteria: 'aitl_recent_criteria_searches', favoriteCriteria: 'aitl_favorite_criteria_titles', recentStandard: 'aitl_recent_standard_searches', favoriteStandard: 'aitl_favorite_standard_titles' };
const state = {
  recentCriteria: loadArray(STORAGE_KEYS.recentCriteria), favoriteCriteria: loadArray(STORAGE_KEYS.favoriteCriteria),
  recentStandard: loadArray(STORAGE_KEYS.recentStandard), favoriteStandard: loadArray(STORAGE_KEYS.favoriteStandard)
};

const topicsEl=document.getElementById('topics'), resultsEl=document.getElementById('results'), dateEl=document.getElementById('date'), search=document.getElementById('search');
const appliedOnlyBtn=document.getElementById('appliedOnlyBtn'), criteriaCollapseAllBtn=document.getElementById('criteriaCollapseAllBtn'), stdSearch=document.getElementById('stdSearch'), stdCollapseAllBtn=document.getElementById('stdCollapseAllBtn');

// --- 유틸리티 함수 ---
function loadArray(k){ try{ const p=JSON.parse(localStorage.getItem(k)||'[]'); return Array.isArray(p)?p:[]; }catch(e){ return []; } }
function saveArray(k,v){ localStorage.setItem(k,JSON.stringify(v)); }
function uniqPush(arr,v,max=8){ const c=(v||'').trim(); return c ? [c,...arr.filter(x=>x!==c)].slice(0,max) : arr; }
function removeValue(arr,v){ return arr.filter(x=>x!==v); }
function escapeHtml(s){ return (s??'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
function norm(s){ return (s||'').toLowerCase().replace(/\s+/g,''); }

function passFilter(hayRaw, qRaw){
  const h=norm(hayRaw), q=norm(qRaw);
  if(!q) return true;
  if(q.length>=2){ for(let i=0;i<q.length-1;i++) if(h.includes(q.slice(i,i+2))) return true; return false; }
  return true;
}
function scoreMatch(hayRaw, qRaw){
  const h=norm(hayRaw), q=norm(qRaw);
  if(!q) return 0;
  let ch=0, bh=0;
  new Set([...q]).forEach(c=>{ if(h.includes(c)) ch++; });
  if(q.length>=2){ for(let i=0;i<q.length-1;i++) if(h.includes(q.slice(i,i+2))) bh++; }
  return ch+(bh*3);
}

// --- 기본 탭 음성 검색 (단발성) ---
function initVoiceSearch(btnId, statusId, inputEl, type, renderFn1, renderFn2) {
  const btn = document.getElementById(btnId), status = document.getElementById(statusId);
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { btn.disabled=true; status.textContent="음성 미지원"; return; }
  
  const rc = new SR();
  rc.lang="ko-KR"; rc.interimResults=true; rc.continuous=false;
  let listening=false;
  
  btn.onclick = () => {
    if(listening){ rc.stop(); return; }
    try{ listening=true; btn.classList.add('listening'); status.textContent="🎙️ 듣는 중… 말씀하세요"; rc.start(); }
    catch(e){ listening=false; btn.classList.remove('listening'); status.textContent="오류. 다시 시도하세요."; }
  };
  rc.onresult = (e) => {
    let final="", interim="";
    for(let i=e.resultIndex; i<e.results.length; i++) e.results[i].isFinal ? final+=e.results[i][0].transcript : interim+=e.results[i][0].transcript;
    inputEl.value = (final||interim||"").trim();
    if(renderFn1) renderFn1();
    if(renderFn2) renderFn2();
    if(final){
      status.textContent=`인식됨: ${final.trim()}`;
      addRecentSearch(type, final.trim());
    }
  };
  rc.onerror = (e) => status.textContent=`오류: ${e.error}`;
  rc.onend = () => { listening=false; btn.classList.remove('listening'); status.textContent=""; };
}

// --- 테마 및 폰트 변경 ---
(() => {
  const tBtn=document.getElementById('themeToggle'), b=document.body;
  if(localStorage.getItem('themeMode')==='light') b.classList.add('light-mode');
  const upd=()=>{ tBtn.textContent=b.classList.contains('light-mode')?'🌙 다크모드':'☀️ 화이트모드'; };
  tBtn.onclick=()=>{ b.classList.toggle('light-mode'); localStorage.setItem('themeMode',b.classList.contains('light-mode')?'light':'dark'); upd(); };
  upd();
})();
const applyFont=()=>document.querySelectorAll('body,input,button,.topic span,.title,.text,.badge,.range,.std-title,.std-content,.std-keyword-btn,.std-title-btn').forEach(e=>e.style.fontSize=currentFontSize+'px');
document.getElementById('increase-font').onclick=()=>{currentFontSize++; applyFont()};
document.getElementById('decrease-font').onclick=()=>{currentFontSize=Math.max(10,currentFontSize-1); applyFont()};

// --- 즐겨찾기/최근검색어 렌더링 ---
function addRecentSearch(t,v){
  const c=(v||'').trim(); if(!c) return;
  if(t==='criteria'){ state.recentCriteria=uniqPush(state.recentCriteria,c); saveArray(STORAGE_KEYS.recentCriteria,state.recentCriteria); renderRecent('recentSearches',state.recentCriteria,'data-recent-criteria'); }
  else{ state.recentStandard=uniqPush(state.recentStandard,c); saveArray(STORAGE_KEYS.recentStandard,state.recentStandard); renderRecent('stdRecentSearches',state.recentStandard,'data-recent-standard'); }
}
function toggleFavorite(t,title){
  if(t==='criteria'){
    state.favoriteCriteria=state.favoriteCriteria.includes(title)?removeValue(state.favoriteCriteria,title):uniqPush(state.favoriteCriteria,title,40);
    saveArray(STORAGE_KEYS.favoriteCriteria,state.favoriteCriteria); renderFav('favoriteTitles',state.favoriteCriteria,'data-favorite-criteria', DATA, getCriteriaFavoriteKey);
  }else{
    state.favoriteStandard=state.favoriteStandard.includes(title)?removeValue(state.favoriteStandard,title):uniqPush(state.favoriteStandard,title,40);
    saveArray(STORAGE_KEYS.favoriteStandard,state.favoriteStandard); renderFav('stdFavoriteTitles',state.favoriteStandard,'data-favorite-standard', STD_DATA, getStandardFavoriteKey);
  }
}
function renderRecent(id,arr,dataAttr){
  const el=document.getElementById(id); if(!el) return;
  el.innerHTML=arr.length ? arr.map(i=>`<button class="chip" type="button" ${dataAttr}="${escapeHtml(i)}">${escapeHtml(i)}</button>`).join('') : '<div class="empty-chip">기록 없음</div>';
}
function renderFav(id,arr,dataAttr,dataSrc,keyFn){
  const el=document.getElementById(id); if(!el) return;
  el.innerHTML=arr.length ? arr.map(k=>{
    const item=dataSrc.find(i=>keyFn(i)===k), lbl=item?`${item.title} (${item.from||'—'})`:k;
    return `<button class="chip starred" type="button" ${dataAttr}="${escapeHtml(k)}">⭐ ${escapeHtml(lbl)}</button>`;
  }).join('') : '<div class="empty-chip">즐겨찾기 없음</div>';
}
const getCriteriaFavoriteKey=i=>[i.label||'',i.title||'',i.from||'',i.to||''].join('||');
const getStandardFavoriteKey=i=>[i.keyword||'',i.title||'',i.from||'',i.label||''].join('||');

// --- 탭 전환 ---
document.querySelectorAll(".tab-btn").forEach(btn=>btn.onclick=()=>{
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(s=>s.classList.toggle("active",s.id===btn.dataset.tab));
  btn.classList.add("active"); window.scrollTo({top:0,behavior:"smooth"});
  if(btn.dataset.tab==="standard") initStandardTab();
});

// --- 검색 하이라이트 및 이미지 렌더링 ---
function highlight(t,k){
  if(!t||!k) return t;
  const kw=[...new Set(k.split(/[\s,]+/).map(s=>s.trim()).filter(Boolean).sort((a,b)=>b.length-a.length))];
  if(!kw.length) return t;
  let ranges=[];
  kw.forEach(w=>{
    let tgt=w.replace(/\s+/g,''), cmp='', map=[]; if(!tgt) return;
    for(let i=0;i<t.length;i++){ if(!/\s/.test(t[i])){ cmp+=t[i]; map.push(i); } }
    let start=0; while(true){ const idx=cmp.toLowerCase().indexOf(tgt.toLowerCase(),start); if(idx===-1) break; ranges.push([map[idx],map[idx+tgt.length-1]+1]); start=idx+tgt.length; }
  });
  if(!ranges.length) return t; ranges.sort((a,b)=>a[0]-b[0]);
  let merged=[], res='', last=0;
  for(const [s,e] of ranges) (!merged.length || s>merged[merged.length-1][1]) ? merged.push([s,e]) : merged[merged.length-1][1]=Math.max(merged[merged.length-1][1],e);
  for(const [s,e] of merged){ res+=t.slice(last,s)+'<mark>'+t.slice(s,e)+'</mark>'; last=e; }
  return res+t.slice(last);
}
function renderImage(img){ return img?`<div style="margin-top:10px"><img src="${img}" style="width:100%;max-width:400px;cursor:zoom-in;border:1px solid var(--img-border);border-radius:8px;" onclick="document.getElementById('modalImage').src='${img}';document.getElementById('imageModal').style.display='flex';" alt=""><div style="margin-top:4px;font-size:12px;color:var(--img-caption);text-align:center">※ 클릭하여 확대</div></div>`:''; }
function closeImageModal(){ document.getElementById('imageModal').style.display='none'; }

// --- [탭 1] 검사기준 로직 ---
fetch('./data/criteria.json').then(r=>r.json()).then(j=>{
  DATA=j.criteria||[]; DATA.forEach(i=>{if(!TITLE_MAP[i.title])TITLE_MAP[i.title]=[]; TITLE_MAP[i.title].push(i);});
  renderTopics(); renderResults(); renderRecent('recentSearches',state.recentCriteria,'data-recent-criteria'); renderFav('favoriteTitles',state.favoriteCriteria,'data-favorite-criteria', DATA, getCriteriaFavoriteKey);
}).catch(()=>resultsEl.innerHTML='<div class="card"><div class="title">데이터 로드 실패</div></div>');

function renderTopics(){
  if(!topicsEl) return; topicsEl.innerHTML='';
  const q=norm(search.value), ts=Object.keys(TITLE_MAP);
  let show = q ? ts.map(t=>({t,s:scoreMatch(t,search.value),p:passFilter(t,search.value)})).filter(x=>x.p||x.s>0).sort((a,b)=>b.s-a.s||a.t.localeCompare(b.t,'ko')).slice(0,200).map(x=>x.t) : ts;
  show.forEach(t=>{ const l=document.createElement('label'); l.className='topic'; l.innerHTML=`<input type="checkbox" value="${t}" onchange="renderResults()"><span>${highlight(t,search.value)}</span>`; topicsEl.appendChild(l); });
}

function renderResults(){
  if(!resultsEl) return; resultsEl.innerHTML='';
  const sel=new Set([...document.querySelectorAll('#topics input:checked')].map(c=>c.value)), qRaw=search.value, q=norm(qRaw);
  let mat=[];
  if(q){
    let pool=[]; DATA.forEach((i,idx)=>{ if(passFilter(i.title+" "+i.label+" "+i.text,qRaw)) pool.push({i,idx}); });
    if(!pool.length) DATA.forEach((i,idx)=>pool.push({i,idx}));
    mat = pool.map(x=>({i:x.i, idx:x.idx, t:scoreMatch(x.i.title,qRaw)*2+scoreMatch(x.i.text,qRaw)+scoreMatch(x.i.label,qRaw)})).filter(x=>x.t>0)
          .sort((a,b)=> (state.favoriteCriteria.includes(a.i.title)?0:1)-(state.favoriteCriteria.includes(b.i.title)?0:1) || (sel.has(a.i.title)?0:1)-(sel.has(b.i.title)?0:1) || b.t-a.t || a.idx-b.idx).slice(0,120).map(x=>({i:x.i}));
  } else if(sel.size) sel.forEach(v=>(TITLE_MAP[v]||[]).forEach(i=>mat.push({i})));
  else if(state.favoriteCriteria.length) state.favoriteCriteria.forEach(fk=>DATA.forEach(i=>{ if(getCriteriaFavoriteKey(i)===fk) mat.push({i}); }));
  
  if(appliedOnly) mat=mat.filter(({i})=>isApplied(dateEl.value,i.from,i.to));
  if(!mat.length){ resultsEl.innerHTML=`<div class="card"><div class="title">결과 없음</div></div>`; return; }

  mat.forEach(({i})=>{
    const app=isApplied(dateEl.value,i.from,i.to), fk=getCriteriaFavoriteKey(i), fav=state.favoriteCriteria.includes(fk), selTitle=sel.has(i.title);
    resultsEl.innerHTML+=`
      <div class="card ${criteriaCollapseAll?'collapsed':''}" data-favorite-key="${fk}">
        <div class="card-header"><div class="title">${selTitle?`<span class="selected-title">${highlight(i.title,qRaw)}</span>`:highlight(i.title,qRaw)}</div><div class="badge ${app?'ok':'no'}">${app?'🟩 적용':'🟥 미적용'}<div class="range">${i.from||'—'} ~ ${i.to||'현재'}</div></div></div>
        <div class="text-preview">${highlight(i.text.slice(0,100)+'…',qRaw)}</div>
        <div class="row"><div class="text">${highlight(i.text,qRaw)}</div></div>
        <div class="card-image-wrap">${renderImage(i.image)}</div>
        <div class="card-toolbar">
          <button type="button" class="small-action-btn ${fav?'starred':''}" data-toggle-favorite="${escapeHtml(fk)}">${fav?'⭐ 즐겨찾기 해제':'☆ 즐겨찾기 추가'}</button>
          <button type="button" class="small-action-btn" data-toggle-collapse="criteria">${criteriaCollapseAll?'펼치기':'접기'}</button>
        </div>
      </div>`;
  });
}
const isApplied=(d,f,t)=>{ if(!d)return false; const b=new Date(d); return (!f||b>=new Date(f))&&(!t||b<=new Date(t)); };

let criteriaTimer;
search.oninput=()=>{ renderTopics(); renderResults(); clearTimeout(criteriaTimer); criteriaTimer=setTimeout(()=>addRecentSearch('criteria',search.value),1000); };
document.getElementById('reset').onclick=()=>{ search.value=''; dateEl.value=''; appliedOnly=false; updAppBtn(); document.querySelectorAll('#topics input').forEach(c=>c.checked=false); renderTopics(); renderResults(); };
dateEl.addEventListener('input',renderResults); dateEl.addEventListener('change',renderResults);
const updAppBtn=()=>{ if(appliedOnlyBtn){ appliedOnlyBtn.classList.toggle('active',appliedOnly); appliedOnlyBtn.textContent=appliedOnly?'적용기준만 보기 ON':'적용기준만 보기 OFF'; } };
if(appliedOnlyBtn) appliedOnlyBtn.onclick=()=>{appliedOnly=!appliedOnly; updAppBtn(); renderResults();}; updAppBtn();
if(criteriaCollapseAllBtn) criteriaCollapseAllBtn.onclick=()=>{criteriaCollapseAll=!criteriaCollapseAll; criteriaCollapseAllBtn.classList.toggle('active',criteriaCollapseAll); criteriaCollapseAllBtn.textContent=criteriaCollapseAll?'내용 접기 ON':'내용 접기 OFF'; renderResults();};

// --- [탭 2] 표준화자료 로직 ---
function initStandardTab(){
  if(stdInitialized) return; stdInitialized=true;
  fetch('./data/standardization.json').then(r=>r.json()).then(j=>{
    STD_DATA=Array.isArray(j)?j:(j.standardization||[]); STD_KEYWORD_MAP={};
    STD_DATA.forEach(i=>{ const k=i.keyword||"기타"; if(!STD_KEYWORD_MAP[k])STD_KEYWORD_MAP[k]=[]; STD_KEYWORD_MAP[k].push(i); });
    stdLoaded=true; renderRecent('stdRecentSearches',state.recentStandard,'data-recent-standard'); renderFav('stdFavoriteTitles',state.favoriteStandard,'data-favorite-standard',STD_DATA,getStandardFavoriteKey);
    renderStdTree(); renderStdList();
  }).catch(()=>stdLoaded=true);
}

function renderStdTree(){
  const w=document.getElementById("stdChapters"), qRaw=stdSearch.value, kwds=Object.keys(STD_KEYWORD_MAP); if(!w) return;
  let show = qRaw ? kwds.map(k=>({k,s:scoreMatch(k,qRaw)*3+(STD_KEYWORD_MAP[k]||[]).reduce((sum,i)=>sum+scoreMatch(i.title,qRaw)*2+scoreMatch(i.text,qRaw),0),p:passFilter(k,qRaw)||(STD_KEYWORD_MAP[k]||[]).some(i=>passFilter((i.title||"")+" "+(i.text||""),qRaw))})).filter(x=>x.p||x.s>0).sort((a,b)=>b.s-a.s||a.k.localeCompare(b.k,'ko')).map(x=>x.k) : kwds;
  if(!show.length){ w.innerHTML=`<div class="std-empty">일치하는 키워드가 없습니다.</div>`; return; }
  w.innerHTML=`<div class="std-chapters-head"><span>키워드 선택</span></div><div class="std-chapters-grid">`+show.map(k=>{
    let t=STD_KEYWORD_MAP[k]||[]; if(qRaw) t=t.map(i=>({i,s:scoreMatch(i.title,qRaw)*2+scoreMatch(i.keyword,qRaw)*3,p:passFilter(i.title+" "+i.text,qRaw)})).filter(x=>x.p||x.s>0).sort((a,b)=>b.s-a.s||a.i.title.localeCompare(b.i.title,'ko')).map(x=>x.i);
    const isOpen=stdOpenKeyword===k;
    return `<div class="std-keyword-block"><button class="std-keyword-btn ${isOpen?'active':''}" type="button" data-keyword="${escapeHtml(k)}"><span class="std-keyword-name">${highlight(k,qRaw)}</span><span class="std-arrow">${isOpen?'▲':'▼'}</span></button>
      <div class="std-title-list ${isOpen?'open':''}">${t.map(i=>`<button class="std-title-btn ${stdSelectedTitle===i.title?'active':''}" type="button" data-title="${escapeHtml(i.title)}" data-keyword="${escapeHtml(k)}">${highlight(i.title,qRaw)}</button>`).join("")||'<div class="std-empty">없음</div>'}</div></div>`;
  }).join("")+`</div>`;
}

function renderStdList(){
  const lst=document.getElementById("stdList"), cnt=document.getElementById("stdCount"), qRaw=stdSearch.value; if(!lst) return;
  if(!stdLoaded){ lst.innerHTML=`<div class="std-empty">로딩중...</div>`; return; }
  let list=[];
  if(qRaw){
    let pool=[]; STD_DATA.forEach((i,idx)=>{ if(passFilter(i.keyword+" "+i.title+" "+i.text,qRaw)) pool.push({i,idx}); });
    if(!pool.length) STD_DATA.forEach((i,idx)=>pool.push({i,idx}));
    list=pool.map(x=>({i:x.i, idx:x.idx, t:scoreMatch(x.i.keyword,qRaw)*3+scoreMatch(x.i.title,qRaw)*2+scoreMatch(x.i.text,qRaw)})).filter(x=>x.t>0)
        .sort((a,b)=>(state.favoriteStandard.includes(a.i.title)?0:1)-(state.favoriteStandard.includes(b.i.title)?0:1)||(stdSelectedTitle===a.i.title?-1:stdSelectedTitle===b.i.title?1:0)||b.t-a.t||a.idx-b.idx).slice(0,120).map(x=>x.i);
  }else if(stdSelectedTitle) list=STD_DATA.filter(i=>i.title===stdSelectedTitle);
  else if(state.favoriteStandard.length) list=state.favoriteStandard.map(fk=>STD_DATA.find(i=>getStandardFavoriteKey(i)===fk)).filter(Boolean);
  
  if(cnt) cnt.textContent=`검색 결과: ${list.length}건`;
  if(!list.length){ lst.innerHTML=`<div class="std-empty">검색결과 없음</div>`; return; }
  lst.innerHTML=list.map(i=>{
    const fk=getStandardFavoriteKey(i), fav=state.favoriteStandard.includes(fk), st=stdSelectedTitle===i.title;
    return `<div class="std-item ${stdCollapseAll?'collapsed':''}" data-favorite-key="${escapeHtml(fk)}">
      <div class="std-item-top"><h3 class="std-title">${st?`<span class="selected-title">${highlight(i.title,qRaw)}</span>`:highlight(i.title,qRaw)}</h3><div class="std-badge">${highlight(i.keyword||'',qRaw)}</div></div>
      <div class="std-preview">${highlight(i.text.slice(0,100)+'…',qRaw)}</div>
      <div class="std-content">${highlight(i.text||'',qRaw)}</div><div class="std-apply">적용시점: ${i.from||'—'}</div><div class="std-image-wrap">${renderImage(i.image)}</div>
      <div class="std-card-toolbar"><button type="button" class="small-action-btn ${fav?'starred':''}" data-toggle-std-favorite="${escapeHtml(fk)}">${fav?'⭐ 해제':'☆ 추가'}</button><button type="button" class="small-action-btn" data-toggle-collapse="standard">${stdCollapseAll?'펼치기':'접기'}</button></div>
    </div>`;
  }).join("");
}

if(stdSearch) stdSearch.oninput=()=>{ renderStdTree(); renderStdList(); clearTimeout(stdTimer); stdTimer=setTimeout(()=>addRecentSearch('standard',stdSearch.value),1000); };

  if(fst){ toggleFavorite('standard',fst.dataset.toggleStdFavorite); renderStdList(); }

// ==========================================
// 💡 AI 비서 기능 (마이크 + 텍스트 채팅 공통 처리)
// ==========================================
(() => {
  const aiModal = document.getElementById('aiModal');
  const aiFabBtn = document.getElementById('aiFabBtn');
  const aiCloseBtn = document.getElementById('aiCloseBtn');
  const aiMicBtn = document.getElementById('aiMicBtn');
  const aiSendBtn = document.getElementById('aiSendBtn');
  const aiTextInput = document.getElementById('aiTextInput');
  const aiStatus = document.getElementById('aiStatus');
  const aiChatArea = document.getElementById('aiChatArea');

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;
  let aiListening = false;
  let finalQueryText = ""; 
  let currentInterim = "";

  if (SR) {
    recognition = new SR();
    recognition.lang = "ko-KR";
    recognition.interimResults = true; 
    recognition.continuous = true; 
  }

  aiFabBtn.onclick = () => {
    aiModal.style.display = 'flex';
    aiModal.setAttribute('aria-hidden', 'false');
    setTimeout(() => aiTextInput.focus(), 100);
  };
  
  const closeAiModal = () => {
    if (document.activeElement) document.activeElement.blur(); // 접근성 경고 해결
    aiModal.style.display = 'none';
    aiModal.setAttribute('aria-hidden', 'true');
    if(aiListening && recognition) recognition.stop();
    window.speechSynthesis.cancel();
  };
  
  aiCloseBtn.onclick = closeAiModal;
  aiModal.onclick = (e) => { if(e.target === aiModal) closeAiModal(); };

  function addMessage(text, isUser, isError = false) {
    const div = document.createElement('div');
    if (isError) {
      div.className = 'ai-bubble error';
    } else {
      div.className = `ai-bubble ${isUser ? 'user' : 'bot'}`;
    }
    div.innerText = text; 
    aiChatArea.appendChild(div);
    aiChatArea.scrollTop = aiChatArea.scrollHeight;
  }

  function getContextFromData(query) {
    let pool = [];
    const qRaw = query || "";
    
    DATA.forEach(i => {
      const score = scoreMatch(i.title, qRaw)*2 + scoreMatch(i.text, qRaw);
      if(score > 0) pool.push({text: `[검사기준] ${i.title}: ${i.text}`, score});
    });
    STD_DATA.forEach(i => {
      const score = scoreMatch(i.title, qRaw)*2 + scoreMatch(i.text, qRaw);
      if(score > 0) pool.push({text: `[표준화자료] ${i.title}: ${i.text}`, score});
    });

    pool.sort((a,b) => b.score - a.score);
    const topResults = pool.slice(0, 5).map(x => x.text).join("\n\n");
    return topResults || "관련 데이터가 없습니다.";
  }

  async function askGemini(userQuery, contextText) {
    const prompt = `
너는 승강기 안전기준을 안내하는 전문 AI 비서야.
아래에 제공된 [참고 자료] 내용만을 바탕으로 검사원의 [질문]에 답변해줘.

[참고 자료]
${contextText}

[질문]
${userQuery}

규칙:
1. 반드시 [참고 자료] 내용만 사용할 것 (배경지식 사용 금지).
2. [참고 자료]에 답이 없다면 "해당 내용을 찾을 수 없습니다."라고만 말할 것.
3. 2~3문장으로 간결하고 명확하게 존댓말로 답변할 것.
4. 중요: 음성 인식 오류로 인한 오타(예: '비트' -> '피트', '차' -> '카', '도어' -> '문' 등)가 의심될 경우, 승강기 검사기준 문맥에 맞게 스스로 교정하여 이해하고 답변할 것.
`;

    const modelsToTry = ['gemini-1.5-flash', 'gemini-1.5-flash-latest', 'gemini-1.5-pro', 'gemini-1.0-pro', 'gemini-pro'];
    let lastErrorMsg = "";

    for (const modelName of modelsToTry) {
      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${GEMINI_API_KEY}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        const data = await response.json();
        if (data.error) { lastErrorMsg = data.error.message; continue; }
        return { success: true, text: data.candidates[0].content.parts[0].text };
      } catch (error) { lastErrorMsg = error.message; }
    }

    return { success: false, text: `통신 오류가 발생했습니다.\n\n[원인: ${lastErrorMsg}]\n\n※ 사내망 차단 또는 API 키 활성화 지연 문제일 수 있습니다.` };
  }

  function speakText(text) {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'ko-KR';
    utterance.rate = 1.1;
    window.speechSynthesis.speak(utterance);
  }

  // 💡 공통 질문 처리 함수 (마이크/텍스트 모두 사용)
  async function processQuery(query) {
    if (!query) return;
    
    // UI 비활성화 (전송 중 중복 입력 방지)
    aiTextInput.disabled = true;
    aiSendBtn.disabled = true;
    aiMicBtn.disabled = true;
    
    aiStatus.textContent = "AI가 생각 중입니다... 🤔";
    addMessage(query, true);

    const context = getContextFromData(query);
    const aiResponse = await askGemini(query, context);

    // UI 활성화
    aiTextInput.disabled = false;
    aiSendBtn.disabled = false;
    aiMicBtn.disabled = false;
    aiTextInput.value = "";
    aiTextInput.focus();

    aiStatus.textContent = "텍스트를 입력하거나 마이크를 누르세요.";
    
    if (aiResponse.success) {
      addMessage(aiResponse.text, false);
      speakText(aiResponse.text);
    } else {
      addMessage(aiResponse.text, false, true); 
    }
  }

  // --- 텍스트 전송 로직 ---
  aiSendBtn.onclick = () => {
    processQuery(aiTextInput.value.trim());
  };

  aiTextInput.onkeypress = (e) => {
    if (e.key === 'Enter') {
      processQuery(aiTextInput.value.trim());
    }
  };

  // --- 마이크 전송 로직 ---
  aiMicBtn.onclick = () => {
    if (!recognition) {
      aiStatus.textContent = "음성 인식을 지원하지 않는 브라우저입니다.";
      return;
    }

    if (aiListening) {
      recognition.stop(); 
      return;
    }

    finalQueryText = ""; 
    currentInterim = "";
    window.speechSynthesis.cancel();
    aiListening = true;
    aiMicBtn.classList.add('recording');
    aiStatus.innerHTML = "자유롭게 말씀하신 후 <strong>마이크를 한 번 더 누르세요.</strong>";
    recognition.start();
  };

  recognition.onresult = (event) => {
    currentInterim = "";
    let newlyFinal = "";
    
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) newlyFinal += event.results[i][0].transcript;
      else currentInterim += event.results[i][0].transcript;
    }
    
    if (newlyFinal) finalQueryText += newlyFinal + " "; 
    aiStatus.innerHTML = `듣는 중: <span style="color:#19c37d">${finalQueryText + currentInterim}</span>`;
  };

  recognition.onend = () => {
    aiListening = false;
    aiMicBtn.classList.remove('recording');

    const query = (finalQueryText + currentInterim).trim();
    finalQueryText = ""; 
    currentInterim = "";

    if (!query) {
      aiStatus.textContent = "텍스트를 입력하거나 마이크를 누르세요.";
      return;
    }

    processQuery(query);
  };

  recognition.onerror = (event) => {
    aiStatus.textContent = `마이크 오류: ${event.error} (다시 눌러주세요)`;
  };

})();
</script>
